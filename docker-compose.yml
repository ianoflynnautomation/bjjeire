  #       condition: service_healthy
  #   healthcheck:
  #     <<: *healthcheck-curl
  #     test: ["CMD", "curl", "-f", "-k", "https://localhost:443/health"]

  mongodb:
    <<: *default-service
    profiles: ["app"]
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    secrets:
      - mongodb_password
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  frontend_dist_volume:

secrets:
  cert_password:
    file: ./secrets/cert_password.txt
  mongodb_password:
    file: ./secrets/mongodb_password.txt

networks:
  bjj-network:
    driver: bridge
