  #   profiles: ["app"]
  #   container_name: web
  #   volumes:
  #     - frontend_dist_volume:/app/dist
  #   command: ["npm", "run", "build"]
  #   deploy: 
  #     resources:
  #       limits:
  #         cpus: '0.75'
  #         memory: 2048M
  #       reservations:
  #         cpus: '0.50'
  #         memory: 1024M 

  # nginx:
  #   <<: *default-service
  #   profiles: ["app"]
  #   image: nginx:latest
  #   container_name: nginx
  #   ports:
