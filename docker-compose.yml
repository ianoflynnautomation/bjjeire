services:
  api:
    platform: linux/arm64
    container_name: api
    build:
      context: .
      dockerfile: ./src/Api/Dockerfile
    ports:
      - "5003:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ASPNETCORE_HTTP_PORT=${ASPNETCORE_HTTP_PORT}
      - ASPNETCORE_HTTPS_PORT=${ASPNETCORE_HTTPS_PORT}
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${ASPNETCORE_KESTREL_CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=${ASPNETCORE_KESTREL_CERT_PATH}
      - ConnectionStrings__Mongodb=mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-password}@${MONGODB_HOST:-mongodb}:${MONGODB_PORT:-27017}/${MONGODB_DB:-Mongodb}?authSource=admin&authMechanism=SCRAM-SHA-256
      - CorsOptions__AllowedOrigins=${CORS_ORIGINS}
      - Serilog__WriteTo__1__Args__serverUrl=${SEQ_URL}
      - Serilog__WriteTo__2__Args__endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - Serilog__Properties__Application=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_RESOURCE_ATTRIBUTES__service.name=${OTEL_SERVICE_NAME}
    volumes:
      - ./logs:/app/logs
      - ./certs:/https:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bjj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    platform: linux/arm64
    container_name: web
    build:
      context: .
      dockerfile: src/bjjworld-app/Dockerfile
    ports:
      - "60742:80"
      - "60743:443" 
    environment:
      - BROWSER=${BROWSER}
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - SERVICES_API_HTTP_0=${SERVICES_API_HTTP_0}
      - SERVICES_API_HTTPS_0=${SERVICES_API_HTTPS_0}
      - VITE_APP_API_URL=${VITE_APP_API_URL}
      - VITE_APP_ENABLE_API_MOCKING=${VITE_APP_ENABLE_API_MOCKING}
      - VITE_APP_MOCK_API_PORT=${VITE_APP_MOCK_API_PORT}
      - VITE_APP_URL=${VITE_APP_URL}
      - VITE_APP_PAGE_SIZE=${VITE_APP_PAGE_SIZE}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bjj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:443/health"] 
      interval: 30s
      timeout: 10s 
      retries: 3 
      start_period: 10s

  mongodb:
    platform: linux/arm64
    image: mongo:latest
    ports:
      - "27017:27017"
    container_name: mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  mongo-exporter:
    platform: linux/arm64
    image: percona/mongodb_exporter:0.44
    container_name: mongo-exporter
    command: --mongodb.uri=mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-password}@${MONGODB_HOST:-mongodb}:${MONGODB_PORT:-27017}/${MONGODB_DB:-Mongodb}?authSource=admin&authMechanism=SCRAM-SHA-256
    ports:
      - "9216:9216"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bjj-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: --config /etc/otel/config.yaml
    environment:
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT}
      - LOKI_ENDPOINT=${LOKI_ENDPOINT}
    volumes:
      - ${BASE_PATH}/infra/otel-collector/otel-config.yaml:/etc/otel/config.yaml
      - ${BASE_PATH}/infra/otel-collector/log:/log/otel
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - 8888:8888
      - 8889:8889 
      - 13133:13133 
      - "55679:55679"
      - 4317:4317 
      - 4318:4318
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: nobody 
    # deploy:
    #   replicas: 2
    volumes:
      - ${BASE_PATH}/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${BASE_PATH}/infra/prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - 9090:9090
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - alertmanager
    networks:
      - bjj-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ${BASE_PATH}/infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - 9093:9093
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  grafana:
    image: grafana/grafana:latest
    # container_name: grafana
    restart: unless-stopped
    user: "472"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=${GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=${GF_DASHBOARDS_MIN_REFRESH_INTERVAL}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
      - GF_LOG_LEVEL=${GF_LOG_LEVEL}
      - GF_LOG_MODE=${GF_LOG_MODE}
      - GF_DATABASE_TYPE=${GF_DATABASE_TYPE}
      - GF_DATABASE_HOST=${GF_DATABASE_HOST}
      - GF_DATABASE_NAME=${POSTGRES_DB_NAME}
      - GF_DATABASE_USER=${POSTGRES_USER}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - GF_AUTH_SESSION_PROVIDER=${GF_AUTH_SESSION_PROVIDER}
      - GF_AUTH_SESSION_PROVIDER_CONFIG=${GF_AUTH_SESSION_PROVIDER_CONFIG}
      - GF_REMOTE_CACHE_TYPE=${GF_REMOTE_CACHE_TYPE}
      - GF_REMOTE_CACHE_CONNSTR=${GF_REMOTE_CACHE_CONNSTR}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GF_SERVER_SERVE_FROM_SUB_PATH}
      - GF_UNIFIED_ALERTING_HA_REDIS_ADDRESS=${GF_UNIFIED_ALERTING_HA_REDIS_ADDRESS}
      - GF_UNIFIED_ALERTING_HA_REDIS_PASSWORD=${GF_UNIFIED_ALERTING_HA_REDIS_PASSWORD}
      - GF_UNIFIED_ALERTING_HA_REDIS_DB=${GF_UNIFIED_ALERTING_HA_REDIS_DB}
      - GF_UNIFIED_ALERTING_HA_REDIS_MASTER_NAME=${GF_UNIFIED_ALERTING_HA_REDIS_MASTER_NAME}
    volumes:
      - grafana-data:/var/lib/grafana
      - ${BASE_PATH}/infra/grafana/config/:/etc/grafana/
      - ${BASE_PATH}/infra/grafana/dashboards/:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      haproxy:
        condition: service_started
      redis-sentinel-1:
        condition: service_healthy 
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  grafana-nginx:
    image: nginx:latest
    deploy:
      replicas: 1
    volumes:
      - ${BASE_PATH}/infra/grafana/nginx/grafana-nginx.conf:/etc/nginx/nginx.conf
      - ${BASE_PATH}/certs/grafana-certs:/etc/nginx/certs
    ports:
      - "8080:80" 
      - "8443:443"
    depends_on:
      - grafana
    networks:
      - bjj-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: etcd
    restart: unless-stopped
    environment:
      - ETCD_NAME=etcd
      - ETCD_ENABLE_V2=true
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://${ETCD_NODE_1}:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://${ETCD_NODE_1}:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://${ETCD_NODE_1}:2380
      #- ETCD_INITIAL_CLUSTER=etcd=http://${IP_NODO_HA}:2380,etcd=http://${ETCD_NODE_1}:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ETCD_DATA_DIR=/etcd_data
    volumes:
      - etcd_data:/etcd_data
    ports:
      - "2379:2379"
      - "2380:2380"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjj-network

  postgres-1:
    container_name: postgres-1
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    environment:
      - PATRONI_NAME=postgres-1
      - PATRONI_SCOPE=${PATRONI_SCOPE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME}
      - PATRONI_POSTGRES_SUPERUSER_USERNAME=${POSTGRES_USER}
      - PATRONI_POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=${REPLICATION_USERNAME}
      - PATRONI_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
      - ETCD_NODE_1=${ETCD_NODE_1}
    volumes:
      - postgres_data_1:/var/lib/postgresql/data
      - ${BASE_PATH}/infra/postgres/patroni.yml:/venv/etc/patroni.yml:ro
      - ${BASE_PATH}/infra/postgres/post_init.sh:/scripts/post_init.sh
      - ${BASE_PATH}/infra/postgres/certs/server.crt:/home/postgres/server.crt:ro
      - ${BASE_PATH}/infra/postgres/certs/server.key:/home/postgres/server.key:ro
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "5432:5432"
      - "8008:8008"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjj-network

  # postgres-2:
  #   container_name: postgres-2
  #   build:
  #     context: ./infra/postgres
  #     dockerfile: Dockerfile
  #   environment:
  #     - PATRONI_NAME=postgres-2
  #     - PATRONI_SCOPE=mycluster
  #     - POSTGRES_USER=grafana
  #     - POSTGRES_PASSWORD=Postgres.12345
  #     - REPLICATION_USERNAME=replicator
  #     - REPLICATION_PASSWORD=replicator_password
