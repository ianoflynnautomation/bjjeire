  #     - postgres_data_replica:/var/lib/postgresql/data
  #     - ${BASE_PATH}/infra/postgres/patroni.yml:/etc/patroni.yml
  #     - ${BASE_PATH}/infra/postgres/post_init.sh:/scripts/post_init.sh
  #   depends_on:
  #     etcd:
  #       condition: service_healthy
  #   ports:
  #     - "5434:5432"
  #     - "8009:8008"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   networks:
  #     - bjj-network
        
  haproxy:
    image: haproxy:latest
    container_name: haproxy
    restart: unless-stopped
    volumes:
      - ${BASE_PATH}/infra/postgres/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    # ports:
    #   - "5004:5004"
    depends_on:
      - postgres-1
      # postgres-1:
      #   condition: service_healthy
      # postgres-2:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjj-network

  redis-primary:
    image: redis:7
    container_name: redis-primary 
    volumes:
      - redis_data_primary:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  redis-replica:
    image: redis:7
    container_name: redis-replica
    volumes:
      - redis_data_replica:/data
    command: redis-server --slaveof redis-primary 6379 --requirepass ${REDIS_PASSWORD:-password} --masterauth ${REDIS_PASSWORD:-password}
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  redis-sentinel-1:
    image: redis:7
    container_name: redis-sentinel-1
    # command: redis-sentinel /etc/redis/sentinel.conf
    command: >
      sh -c "
        echo 'Waiting for redis-primary DNS...' &&
        while ! getent hosts redis-primary; do sleep 1; done &&
        echo 'redis-primary resolved, starting Sentinel.' &&
        redis-sentinel /etc/redis/sentinel.conf
      "
    volumes:
      - redis_sentinel_data:/data
      - ${BASE_PATH}/infra/redis/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - bjj-network

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:latest
    command: --query.ui-config /etc/jaeger/jaeger-ui.json
    environment:
      - METRICS_STORAGE_TYPE=${METRICS_STORAGE_TYPE}
      - PROMETHEUS_SERVER_URL=${PROMETHEUS_SERVER_URL}
      - COLLECTOR_OTLP_ENABLED=${COLLECTOR_OTLP_ENABLED}
    volumes:
      - ${BASE_PATH}/infra/jaeger/jaeger-ui.json:/etc/jaeger/jaeger-ui.json
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "16686:16686"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  loki:
    container_name: loki
    image: grafana/loki:latest
    command: -config.file=/mnt/config/loki-config.yml
    volumes:
      - ${BASE_PATH}/infra/loki/loki.yml:/mnt/config/loki-config.yml
      - loki-index:/loki/index
      - loki-chunks:/loki/chunks
      - loki-rules:/loki/rules
      # - loki-wal:/loki/wal
      # - loki-compactor:/loki/compactor
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command: "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - bjj-network

  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: Y
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bjj-network

volumes:
  mongodb_data:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  # postgres-data:
  # redis-data:
  # postgres_data_primary:
  # postgres_data_replica:
  etcd_data:
  postgres_data_1:
  # postgres_data_2:
  redis_data_primary:
  redis_data_replica:
  redis_sentinel_data:
  loki-index:
  loki-chunks:
  loki-rules:
  # loki-wal:
  # loki-compactor:

networks:
  bjj-network:
    driver: bridge 