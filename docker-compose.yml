  #   volumes:
  #     - ${BASE_PATH}/infra/nginx/default.conf.template:/etc/nginx/templates/default.conf.template
  #     - ${BASE_PATH}/certs/aspnetapp.crt:/etc/nginx/certs/aspnetapp.crt
  #     - ${BASE_PATH}/certs/aspnetapp.key:/etc/nginx/certs/aspnetapp.key
  #     - ${BASE_PATH}/logs/nginx:/var/log/nginx
  #     - frontend_dist_volume:/usr/share/nginx/html:ro
  #   environment:
  #     - PORT=${PORT}
  #     - SERVICES_API_HTTP_0=${SERVICES_API_HTTP_0}
  #     - SERVICES_API_HTTPS_0=${SERVICES_API_HTTPS_0}
  #   depends_on:
