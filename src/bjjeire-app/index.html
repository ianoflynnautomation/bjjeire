    <script>
      ;(function () {
        var s = localStorage.getItem('bjjeire-theme')
        var dark = s === 'dark' || (!s && globalThis.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
      })()
    </script>
