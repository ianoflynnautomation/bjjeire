#cloud-config
package_update: true
package_upgrade: true

# Install essential packages
packages:
  - python3          # Latest Python 3 for scripting and tools
  - python3-pip      # Python package manager
  - stress-ng        # Performance testing tool (existing)
  - htop             # Interactive process viewer for monitoring
  - vim              # Text editor for config edits
  - curl             # Network tool for testing connectivity
  - net-tools        # Basic networking tools (e.g., netstat, ifconfig)
  - sysstat          # System performance tools (e.g., iostat, sar)
  - jq               # JSON parser for log/config handling
  - unzip            # Archive extraction utility
  - git              # Version control for scripts or configs
  - azure-cli        # Azure CLI for managing Azure resources from the VM
  - wget             # Alternative to curl for downloading files
  - chrony           # Time synchronization (replaces ntp on modern distros)
  - fail2ban         # Security tool to protect against brute-force attacks
  - ufw              # Simple firewall management (optional, for basic security)
  - cloud-init       # Ensure cloud-init is installed and up-to-date
  - walinuxagent     # Azure Linux Agent for VM integration with Azure services

# Generate performance load for metrics or additional setup
runcmd:
  - python3 --version  # Verify Python installation
  - systemctl enable chrony  # Ensure time sync is enabled
  - systemctl start chrony
  
