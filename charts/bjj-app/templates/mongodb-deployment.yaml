apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bjj-app.mongodb.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bjj-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "bjj-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "bjj-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongodb
          image: "mongo:latest"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: {{ .Values.environment.mongodb.MONGODB_PORT }}
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: {{ .Values.environment.mongodb.MONGODB_USER | quote }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.mongodbRootPassword.name }}
                  key: {{ .Values.secrets.mongodbRootPassword.key }}
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.environment.mongodb.MONGODB_DB | quote }}
          volumeMounts:
            - name: mongodb-persistent-storage
              mountPath: /data/db
          resources:
            {{- toYaml .Values.resources.mongodb | nindent 12 }}
          livenessProbe:
            {{- if .Values.azure.enabled }}
            tcpSocket:
              port: {{ .Values.environment.mongodb.MONGODB_PORT }}
            {{- else }}
            exec:
              command:
                - mongosh
                - localhost:{{ .Values.environment.mongodb.MONGODB_PORT | toString }}/test
                - --eval
                - 'db.runCommand("ping").ok'
                - --quiet
            {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            {{- if .Values.azure.enabled }}
            tcpSocket:
              port: {{ .Values.environment.mongodb.MONGODB_PORT }}
            {{- else }}
            exec:
              command:
                - mongosh
                - localhost:{{ .Values.environment.mongodb.MONGODB_PORT | toString }}/test
                - --eval
                - 'db.runCommand("ping").ok'
                - --quiet
            {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: mongodb-persistent-storage
          persistentVolumeClaim:
            claimName: {{ include "bjj-app.mongodb.fullname" . }}-pvc
