apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bjj-app.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bjj-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range $hostRule := .Values.ingress.hosts }}
    - host: {{ $hostRule.host | quote }}
      http:
        paths:
          {{- range $pathEntry := $hostRule.paths }}
          - path: {{ $pathEntry.path }}
            pathType: {{ $pathEntry.pathType }}
            backend:
              service:
                name: {{ include "bjj-app.fullname" $ }}-{{ if eq $hostRule.host "api.bjj.local" }}api{{ else if eq $hostRule.host "app.bjj.local" }}frontend{{ else }}default{{ end }}
                port:
                  number: {{ $pathEntry.servicePort }}
          {{- end }}
    {{- end }}
