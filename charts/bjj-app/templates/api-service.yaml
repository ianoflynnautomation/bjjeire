apiVersion: v1
kind: Service
metadata:
  name: {{ include "bjj-app.api.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bjj-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.api.httpsPort }}
    - port: {{ .Values.service.api.httpsPort }}
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
  selector:
    {{- include "bjj-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
