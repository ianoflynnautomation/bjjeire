nameOverride: "bjj-app"
fullnameOverride: "bjj-app"

replicaCount: 1

image:
  repository: bjj-api
  frontendRepository: bjj-frontend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  api:
    type: ClusterIP
    port: 80
    httpsPort: 443
  frontend:
    type: ClusterIP
    port: 80
    httpsPort: 443

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
  hosts:
    - host: api.bjj.local
      paths:
        - path: /
          pathType: Prefix
          serviceName: ""
          servicePort: 80
    - host: app.bjj.local
      paths:
        - path: /
          pathType: Prefix
          serviceName: ""
          servicePort: 80
  tls:
    - secretName: bjj-tls-secret
      hosts:
        - api.bjj.local
        - app.bjj.local

resources:
  api:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  frontend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  mongodb:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

environment:
  api:
    ASPNETCORE_ENVIRONMENT: Development
    ASPNETCORE_URLS: "http://+:80;https://+:443"
    CorsOptions__AllowedOrigins: "https://app.bjj.local,http://app.bjj.local,http://bjj-app-frontend:80,https://bjj-app-frontend:443"
    Serilog__WriteTo__1__Args__serverUrl: http://seq:80
    Serilog__WriteTo__2__Args__endpoint: http://otel-collector:4317
    Serilog__Properties__Application: BjjWorld.Api
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    OTEL_RESOURCE_ATTRIBUTES__service.name: BjjWorld.Api

  frontend:
    NODE_ENV: production
    PORT: 80

  mongodb:
    MONGODB_USER: admin
    MONGODB_HOST: mongodb
    MONGODB_PORT: 27017
    MONGODB_DB: Mongodb

mongodbVolume:
  enabled: true
  size: 10Gi
  storageClassName: standard

apiKestrelCertVolume:
  enabled: true
  name: bjj-api-kestrel-cert-secret
  mountPath: /https

frontendNginxCertVolume:
  enabled: true
  name: bjj-frontend-tls-secret
  certMountPath: /etc/nginx/certs/aspnetapp.crt
  keyMountPath: /etc/nginx/certs/aspnetapp.key

secrets:
  apiKestrelCertPassword:
    enabled: true
    create: false
    name: bjj-api-kestrel-cert-password
    key: cert-password
    value: c2VjdXJlcGFzc3dvcmQxMjM=

  mongodbRootPassword:
    enabled: true
    create: false
    name: bjj-mongodb-root-password
    key: mongodb-password

  frontendTlsCert:
    enabled: true
    create: false
    name: bjj-frontend-tls-secret
    key: tls.crt

  frontendTlsKey:
    enabled: true
    create: false
    name: bjj-frontend-tls-secret
    key: tls.key

namespace: bjj-app

azure:
  enabled: false
  tenantId: "123"
  keyVaultName: "123"

frontendNginxConfig: |
  worker_processes auto;
  error_log /var/log/nginx/error.log warn;
  pid /var/run/nginx.pid;

  events {
      worker_connections 1024;
  }

  http {
      resolver 10.96.0.10 valid=5s;
      resolver_timeout 5s;

      access_log /var/log/nginx/access.log combined;
      server_tokens off;

      # Optional: Separate server block to redirect HTTP to HTTPS
      server {
          listen 80;
          # CHANGE THIS LINE: Add the expected hostnames
          server_name app.bjj.local 127.0.0.1 localhost;
          # If the probes are *ever* hitting HTTP directly, this would also need the Pod IP

          server_tokens off;

          location / {
              return 301 https://$host$request_uri;
          }

          location /health {
              return 200 "OK";
              add_header Content-Type text/plain;
          }
      }

      server {
          listen 443 ssl default_server;
          http2 on;
          # CHANGE THIS LINE: Add all expected hostnames, including the Minikube IP and service name if used by probes
          # For probes, the Pod IP is the most common target.
          server_name app.bjj.local 127.0.0.1 localhost;
          # You might also need to add the service FQDN if internal services target it by name:
          # bjj-app-frontend.bjj-app.svc.cluster.local
          # and potentially the Pod IP dynamically if the probes aren't hitting by hostname (which they seem to be by IP)

          server_tokens off;

          # SSL configuration
          ssl_certificate       /etc/nginx/certs/aspnetapp.crt;
          ssl_certificate_key   /etc/nginx/certs/aspnetapp.key;
          ssl_protocols         TLSv1.2 TLSv1.3;
          ssl_ciphers           ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
          ssl_session_timeout   1d;
          ssl_session_cache     shared:SSL:10m;
          ssl_session_tickets   off;
          ssl_stapling          on;
          ssl_stapling_verify   on;

          add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;

          access_log /var/log/nginx/server.access.log main;
          error_log  /var/log/nginx/server.error.log warn;

          # Performance: Gzip compression
          gzip on;
          gzip_vary on;
          gzip_proxied any;
          gzip_comp_level 6; # Balance between compression and CPU usage
          gzip_buffers 16 8k;
          gzip_http_version 1.1;
          gzip_min_length 256;
          gzip_types
              application/atom+xml
              application/geo+json
              application/javascript
              application/x-javascript
              application/json
              application/ld+json
              application/manifest+json
              application/rdf+xml
              application/rss+xml
              application/vnd.ms-fontobject
              application/wasm
              application/x-web-app-manifest+json
              application/xhtml+xml
              application/xml
              font/eot
              font/otf
              font/ttf
              image/svg+xml
              image/x-icon
              text/cache-manifest
              text/css
              text/javascript
              text/plain
              text/vcard
              text/vnd.rim.location.xloc
              text/vtt
              text/x-component
              text/x-cross-domain-policy;

          root /usr/share/nginx/html;

          location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
              expires 1y;
              add_header Cache-Control "public";
              access_log off;

          location / {
              try_files $uri $uri/ /index.html;
          }

          location /api/ {
              proxy_pass ${SERVICES_API_HTTPS_0};
              proxy_pass_header Content-Security-Policy;
              proxy_pass_header Permissions-Policy;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade; 
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host $host;
              proxy_cache_bypass $http_upgrade;

              # Headers to pass to the backend
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Port $server_port;
          }

          location /health {
              access_log off;
              return 200 "OK";
              add_header Content-Type text/plain;
          }

          location ~ /\. {
              deny all;
          }
      }
  }