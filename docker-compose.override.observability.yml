
services:
  mongo-exporter:
    <<: *default-service
    profiles: ["monitoring"]
    image: percona/mongodb_exporter:0.44
    container_name: mongo-exporter
    command: --mongodb.uri=mongodb://${MONGODB_USER:-admin}:/run/secrets/mongodb_password@${MONGODB_HOST:-mongodb}:${MONGODB_PORT:-27017}/${MONGODB_DB:-Mongodb}?authSource=admin&authMechanism=SCRAM-SHA-256
    ports:
      - "9216:9216"
    secrets:
      - mongodb_password
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bjj-network

  otel-collector:
    <<: *default-service
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: --config /etc/otel/config.yaml
    environment:
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT}
      - LOKI_ENDPOINT=${LOKI_ENDPOINT}
    volumes:
      - ${BASE_PATH}/infra/otel-collector/otel-config.yaml:/etc/otel/config.yaml
      - ${BASE_PATH}/infra/otel-collector/log:/log/otel
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - 8888:8888
      - 8889:8889
      - 13133:13133
      - "55679:55679"
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:13133"]

  prometheus:
    <<: *default-service
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: prometheus
    user: nobody
    volumes:
      - ${BASE_PATH}/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${BASE_PATH}/infra/prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - 9090:9090
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
    depends_on:
      - alertmanager

  alertmanager:
    <<: *default-service
    profiles: ["monitoring"]
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ${BASE_PATH}/infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - 9093:9093
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:9093/-/healthy"]

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    restart: unless-stopped
    user: "472"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=${GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=${GF_DASHBOARDS_MIN_REFRESH_INTERVAL}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
      - GF_LOG_LEVEL=${GF_LOG_LEVEL}
      - GF_LOG_MODE=${GF_LOG_MODE}
      - GF_DATABASE_TYPE=${GF_DATABASE_TYPE}
      - GF_DATABASE_HOST=${GF_DATABASE_HOST}
      - GF_DATABASE_NAME=${GF_DATABASE_NAME}
      - GF_DATABASE_USER=${GF_DATABASE_USER}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - GF_AUTH_SESSION_PROVIDER=${GF_AUTH_SESSION_PROVIDER}
      - GF_AUTH_SESSION_PROVIDER_CONFIG=${GF_AUTH_SESSION_PROVIDER_CONFIG}
      - GF_REMOTE_CACHE_TYPE=${GF_REMOTE_CACHE_TYPE}
      - GF_REMOTE_CACHE_CONNSTR=${GF_REMOTE_CACHE_CONNSTR}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GF_SERVER_SERVE_FROM_SUB_PATH}
      - GF_UNIFIED_ALERTING_HA_REDIS_ADDRESS=${GF_UNIFIED_ALERTING_HA_REDIS_ADDRESS}
      - GF_UNIFIED_ALERTING_HA_REDIS_PASSWORD=${GF_UNIFIED_ALERTING_HA_REDIS_PASSWORD}
      - GF_UNIFIED_ALERTING_HA_REDIS_DB=${GF_UNIFIED_ALERTING_HA_REDIS_DB}
      - GF_UNIFIED_ALERTING_HA_REDIS_MASTER_NAME=${GF_UNIFIED_ALERTING_HA_REDIS_MASTER_NAME}
    volumes:
      - grafana-data:/var/lib/grafana
      - ${BASE_PATH}/infra/grafana/config/:/etc/grafana/
      - ${BASE_PATH}/infra/grafana/dashboards/:/var/lib/grafana/dashboards
    secrets:
      - grafana_admin_password
      - grafana_db_password
      - redis_password
    depends_on:
      prometheus:
        condition: service_healthy
      haproxy:
        condition: service_started
      redis-sentinel-1:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
    networks:
      - bjj-network

  grafana-nginx:
    profiles: ["monitoring"]
    image: nginx:latest
    deploy:
      replicas: 1
    volumes:
      - ${BASE_PATH}/infra/grafana/nginx/grafana-nginx.conf:/etc/nginx/nginx.conf
      - ${BASE_PATH}/certs/grafana-certs:/etc/nginx/certs
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - grafana
    networks:
      - bjj-network

  etcd:
    <<: *default-service
    profiles: ["monitoring"]
    image: quay.io/coreos/etcd:v3.5.15
    container_name: etcd
    environment:
      - ETCD_NAME=etcd
      - ETCD_ENABLE_V2=true
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://${ETCD_NODE_1}:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://${ETCD_NODE_1}:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://${ETCD_NODE_1}:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ETCD_DATA_DIR=/etcd_data
    volumes:
      - etcd_data:/etcd_data
    ports:
      - "2379:2379"
      - "2380:2380"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-1:
    <<: *default-service
    profiles: ["monitoring"]
    container_name: postgres-1
    build: # Postgres is built locally for now, could be an image later
      context: ./infra/postgres
      dockerfile: Dockerfile
    environment:
      - PATRONI_NAME=postgres-1
      - PATRONI_SCOPE=${PATRONI_SCOPE}
      - PATRONI_RESTAPI_PORT=8008
      - GRAFANA_DB_NAME=${POSTGRES_USER}
      - GRAFANA_DB_USER=${GF_DATABASE_USER}
      - GRAFANA_DB_PASSWORD=${GF_DATABASE_PASSWORD}
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME}
      - PATRONI_POSTGRES_SUPERUSER_USERNAME=${PATRONI_POSTGRES_SUPERUSER_USERNAME}
      - PATRONI_POSTGRES_SUPERUSER_PASSWORD=${PATRONI_POSTGRES_SUPERUSER_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=${PATRONI_REPLICATION_USERNAME}
      - PATRONI_REPLICATION_PASSWORD=${PATRONI_REPLICATION_PASSWORD}
      - ETCD_NODE_1=${ETCD_NODE_1}
    volumes:
      - postgres_data_1:/var/lib/postgresql/data
      - ${BASE_PATH}/infra/postgres/patroni.yml.template:/venv/etc/patroni.yml.template:ro
      - ${BASE_PATH}/infra/postgres/post_init.sh:/scripts/post_init.sh
      - ${BASE_PATH}/infra/postgres/certs/server.crt:/home/postgres/server.crt:ro
      - ${BASE_PATH}/infra/postgres/certs/server.key:/home/postgres/server.key:ro
    secrets:
      - grafana_db_password
      - postgres_superuser_password
      - postgres_replication_password
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "6432:5432"
      - "8008:8008"
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]

  postgres-2:
    <<: *default-service
    profiles: ["monitoring"]
    container_name: postgres-2
    build: # Postgres is built locally for now, could be an image later
      context: ./infra/postgres
      dockerfile: Dockerfile
    environment:
      - PATRONI_NAME=postgres-2
      - PATRONI_SCOPE=${PATRONI_SCOPE}
      - PATRONI_RESTAPI_PORT=8008
      - GRAFANA_DB_NAME=${POSTGRES_USER}
      - GRAFANA_DB_USER=${GF_DATABASE_USER}
      - GRAFANA_DB_PASSWORD=${GF_DATABASE_PASSWORD}
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME}
      - PATRONI_POSTGRES_SUPERUSER_USERNAME=${PATRONI_POSTGRES_SUPERUSER_USERNAME}
      - PATRONI_POSTGRES_SUPERUSER_PASSWORD=${PATRONI_POSTGRES_SUPERUSER_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=${PATRONI_REPLICATION_USERNAME}
      - PATRONI_REPLICATION_PASSWORD=${PATRONI_REPLICATION_PASSWORD}
      - ETCD_NODE_1=${ETCD_NODE_1}
    volumes:
      - postgres_data_2:/var/lib/postgresql/data
      - ${BASE_PATH}/infra/postgres/patroni.yml.template:/venv/etc/patroni.yml.template:ro
      - ${BASE_PATH}/infra/postgres/post_init.sh:/scripts/post_init.sh
      - ${BASE_PATH}/infra/postgres/certs/server.crt:/home/postgres/server.crt:ro
      - ${BASE_PATH}/infra/postgres/certs/server.key:/home/postgres/server.key:ro
    secrets:
      - grafana_db_password
      - postgres_superuser_password
      - postgres_replication_password
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "6433:5432"
      - "8009:8008"
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]

  haproxy:
    <<: *default-service
    profiles: ["monitoring"]
    image: haproxy:latest
    container_name: haproxy
    volumes:
      - ${BASE_PATH}/infra/postgres/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432" # Primary PostgreSQL port
      - "5433:5433" # Secondary PostgreSQL port
      - "7001:7001" # HAProxy stats or health check port
    depends_on:
      - postgres-1
      - postgres-2
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5432"] # Check if HAProxy can connect to PG
      interval: 10s
      timeout: 5s
      retries: 5

  redis-primary:
    <<: *default-service
    profiles: ["monitoring"]
    image: redis:7
    container_name: redis-primary
    volumes:
      - redis_data_primary:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-replica:
    <<: *default-service
    profiles: ["monitoring"]
    image: redis:7
    container_name: redis-replica
    volumes:
      - redis_data_replica:/data
    command: redis-server --slaveof redis-primary 6379 --requirepass ${REDIS_PASSWORD:-password} --masterauth ${REDIS_PASSWORD:-password}
    secrets:
      - redis_password
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-sentinel-1:
    <<: *default-service
    profiles: ["monitoring"]
    image: redis:7
    container_name: redis-sentinel-1
    command: >
      sh -c "
        echo 'Waiting for redis-primary DNS...' &&
        while ! getent hosts redis-primary; do sleep 1; done &&
        echo 'redis-primary resolved, starting Sentinel.' &&
        redis-sentinel /etc/redis/sentinel.conf
      "
    volumes:
      - redis_sentinel_data:/data
      - ${BASE_PATH}/infra/redis/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jaeger:
    <<: *default-service
    profiles: ["monitoring"]
    container_name: jaeger
    image: jaegertracing/all-in-one:latest
    command: --query.ui-config /etc/jaeger/jaeger-ui.json
    environment:
      - METRICS_STORAGE_TYPE=${METRICS_STORAGE_TYPE}
      - PROMETHEUS_SERVER_URL=${PROMETHEUS_SERVER_URL}
      - COLLECTOR_OTLP_ENABLED=${COLLECTOR_OTLP_ENABLED}
    volumes:
      - ${BASE_PATH}/infra/jaeger/jaeger-ui.json:/etc/jaeger/jaeger-ui.json
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "16686:16686"
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:16686"]

  loki:
    <<: *default-service
    profiles: ["monitoring"]
    container_name: loki
    image: grafana/loki:latest
    command: -config.file=/mnt/config/loki-config.yml
    volumes:
      - ${BASE_PATH}/infra/loki/loki.yml:/mnt/config/loki-config.yml
      - loki-index:/loki/index
      - loki-chunks:/loki/chunks
      - loki-rules:/loki/rules
    ports:
      - "3100:3100"
    healthcheck:
      <<: *healthcheck-wget
      test: ["CMD", "wget", "--spider", "http://localhost:3100/ready"]

  node_exporter:
    <<: *default-service
    profiles: ["monitoring"]
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command: "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro # Mount root filesystem as read-only

  seq:
    <<: *default-service
    profiles: ["monitoring"]
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True # Can be toggled with a secret later
    secrets:
      - seq_admin_password
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]

volumes:
  mongodb_data:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  etcd_data:
  postgres_data_1:
  postgres_data_2:
  redis_data_primary:
  redis_data_replica:
  redis_sentinel_data:
  loki-index:
  loki-chunks:
  loki-rules:

secrets:
  cert_password:
    file: ./secrets/cert_password.txt
  mongodb_password:
    file: ./secrets/mongodb_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  grafana_db_password:
    file: ./secrets/grafana_db_password.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_superuser_password:
    file: ./secrets/postgres_superuser_password.txt
  postgres_replication_password:
    file: ./secrets/postgres_replication_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  seq_admin_password:
    file: ./secrets/seq_admin_password.txt

networks:
  bjj-network:
    driver: bridge
