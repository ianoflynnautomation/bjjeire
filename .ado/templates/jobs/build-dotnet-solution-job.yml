parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 15
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}
  outputs:
    build_successful: ${{ variables.buildSuccessfulOutput }}

  variables:
    buildSuccessfulOutput: 'false'

  steps:
    - checkout: self

    - template: ../tasks/setup-dotnet.yml
      parameters:
        dotnetVersion: $(DOTNET_VERSION)

    - script: |
        dotnet restore "$(SOLUTION_PATH)"
      displayName: 'Restore Dependencies'

    - script: |
        dotnet build "$(SOLUTION_PATH)" --configuration $(CONFIGURATION) --no-restore
      displayName: 'Build Solution'
      name: buildDotNetProject

    - task: PowerShell@2
      inputs:
        targetType: 'inline'
          script: |
            # Check the status of the 'buildDotNetProject' task
            # (Note: task status is accessible via $(taskName.TaskResult) in expressions or $env:TASK_NAME_TASKRESULT in scripts)
            if ("$(buildDotNetProject.TaskResult)" -eq "Succeeded") {
              Write-Host "##vso[task.setvariable variable=buildSuccessfulOutput;isOutput=true]true"
            } else {
              Write-Host "##vso[task.setvariable variable=buildSuccessfulOutput;isOutput=true]false"
            }
      displayName: 'Set Build Success Output'