parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 20
  cancelTimeoutInMinutes: 2
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  strategy:
      matrix:
        IntegrationTests:
          testType: 'IntegrationTests'
          testArtifactName: 'published_ApiIntegrationTests'
          testAssemblyPattern: |
              BjjEire.Api.IntegrationTests/**/*
          testFilterCriteria: 'TestCategory!=Ignore'

  steps:
    - checkout: self

    - task: PowerShell@2
      name: SetFinalTestFilter
      displayName: 'Generate and Combine Test Exclusion Filter'
      inputs:
        filePath: '$(System.DefaultWorkingDirectory)/.ado/scripts/Generate-Quarantine-Filter.ps1'
        arguments: >
          -Organization "$(ORGANISATION_NAME)"
          -Project "$(System.TeamProject)"
          -Pat "$(System.AccessToken)"
          -BaseFilter "$(testFilterCriteria)"
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - template: ../tasks/dotnet-run-tests.yml
      parameters:
        dotnetVersion: $(DOTNET_VERSION)
        testArtifactName: $(testArtifactName)
        testAssemblyPattern: $(testAssemblyPattern)
        testResultsNamePrefix: $(testType)
        testFilterCriteria: '$(SetFinalTestFilter.finalTestFilter)'
        downloadPath: '$(TEST_ARTIFACTS_DOWNLOAD_PATH)'