parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'windows-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 15
  cancelTimeoutInMinutes: 2
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  steps:
    - checkout: self

    - task: PowerShell@2
      displayName: 'Install Required PS Modules'
      inputs:
        targetType: 'inline'
        script: |
          Install-Module -Name Az.Resources -Repository PSGallery -Force -AcceptLicense -Scope CurrentUser
          Install-Module -Name Az.Kusto -Repository PSGallery -Force -AcceptLicense -Scope CurrentUser
        pwsh: true

    - task: PowerShell@2
      displayName: 'Analyze and Sync Flaky Tests with Azure Boards'
      inputs:
        filePath: '$(System.DefaultWorkingDirectory)/.ado/scripts/Analyze-FlakyTests-AzureBoards.ps1'
        arguments: >
          -Organization "$(ORGANISATION_NAME)"
          -Project "$(System.TeamProject)"
          -AdoPat $env:SYSTEM_ACCESSTOKEN
          -AreaPath "$(ADO_AREA_PATH)"
          -AdoApiVersion "$(AZURE_API_VERSION)"
          -RepoName "$(PROJECT_REPO_NAME)"
          -TestHealthDashboardUrl "$(AZURE_DEVOPS_TEST_HEALTH_DASHBOARD_URL)"
          -KustoClusterUri "$(AZURE-DEC-KUSTO-CLUSTER-URI)"
          -KustoDatabaseName "$(KUSTO_DATABASE_NAME)"
          -AppClientId "$(KUSTO-APP-CLIENT-ID)"
          -AppClientSecret "$(KUSTO-APP-CLIENT-SECRET)"
          -TenantId "$(KUSTO-TENANT-ID)"
        pwsh: true
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

