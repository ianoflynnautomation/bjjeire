parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 30
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  steps:
    - checkout: self
      fetchDepth: 0

    - task: AzureCLI@2
      displayName: 'Azure Login (using Service Principal)'
      inputs:
        azureSubscription: 'github.com_ianoflynnautomation'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
            echo "Successfully logged into Azure."
            # The AzureCLI task handles login, no explicit 'az login' needed here unless for specific scenarios
            # For OIDC, ensure your Azure Service Connection is configured with Workload Identity Federation

    - task: AzureCLI@2
      displayName: 'ACR Login'
      inputs:
        azureSubscription: 'github.com_ianoflynnautomation'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
            az acr login --name $(AZURE_CONTAINER_REGISTRY_SHORT_NAME)

      # Generate Docker tags dynamically
    - script: |
          # Default tags for branch builds
          API_TAGS="$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):$(Build.SourceBranchName),$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):$(Build.SourceVersion)"
          FRONTEND_TAGS="$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(Build.SourceBranchName),$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(Build.SourceVersion)"

          # Add tag-specific tags if it's a tag push
          if [[ "$(Build.SourceBranch)" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "$(Build.SourceBranch)" | sed 's/refs\/tags\/v//')
            API_TAGS="${API_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):${VERSION_TAG}"
            # Add latest tag for main branch or specific release tags
            if [[ "$(Build.SourceBranchName)" == "main" || "$(Build.SourceBranch)" == "refs/tags/v"* ]]; then
              API_TAGS="${API_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):latest"
              FRONTEND_TAGS="${FRONTEND_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):latest"
            fi
          fi

          echo "##vso[task.setvariable variable=apiImageTags;isOutput=true]$API_TAGS"
          echo "##vso[task.setvariable variable=frontendImageTags;isOutput=true]$FRONTEND_TAGS"
      displayName: 'Generate Docker Metadata (Tags)'
      name: generate_tags # Name this step to reference its output

    - task: Docker@2
      displayName: 'Build and Push API Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(API_IMAGE_NAME)'
        dockerfile: './src/BjjEire.Api/Dockerfile'
        containerRegistry: '$(AZURE_CONTAINER_REGISTRY_SHORT_NAME)' # Use the short name from variables
        tags: $(generate_tags.apiImageTags) # Use output from previous step
        buildContext: '.'
          # No direct equivalent for cache-from/cache-to for buildx in Docker@2 task.
          # Azure DevOps generally uses build agent's cache or a shared cache for subsequent builds on the same agent.

    - task: Docker@2
      displayName: 'Build and Push Frontend Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(FRONTEND_IMAGE_NAME)'
        dockerfile: './src/bjjeire-app/Dockerfile'
        containerRegistry: '$(AZURE_CONTAINER_REGISTRY_SHORT_NAME)'
        tags: $(generate_tags.frontendImageTags) # Use output from previous step
        buildContext: '.'