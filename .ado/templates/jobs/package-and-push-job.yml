parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 30
  cancelTimeoutInMinutes: 2
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  steps:
    - checkout: self
      fetchDepth: 0

    # - script: |
    #     docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    #     docker buildx create --use
    #   displayName: 'Set up Docker Buildx'

    - script: |
          echo "--- Starting Generate Docker Image Tags Script ---"

          # Validate AZURE_CONTAINER_REGISTRY (though it will be unmasked at runtime for the script)
          if [ -z "$(AZURE_CONTAINER_REGISTRY)" ]; then
            echo "##vso[task.logissue type=error]AZURE_CONTAINER_REGISTRY variable is not set or empty. This is critical for tagging."
            exit 1
          fi

          # Get short Git commit SHA for immutable tagging
          SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
          if [ -z "$SHORT_SHA" ]; then
            echo "##vso[task.logissue type=error]SHORT_SHA could not be determined. Exiting."
            exit 1
          fi
          echo "DEBUG: SHORT_SHA = ${SHORT_SHA}"

          # Clean branch name for use in tags
          CLEAN_BRANCH_NAME=$(echo "$(Build.SourceBranch)" | \
              sed 's/^refs\/heads\///g' | \
              sed 's/^refs\/pull\///g' | \
              sed 's/^refs\/tags\///g' | \
              tr '/' '-' | \
              tr '[:upper:]' '[:lower:]' | \
              sed 's/[^a-z0-9\.-]//g' )
          
          if [ -z "$CLEAN_BRANCH_NAME" ]; then
            CLEAN_BRANCH_NAME="unknown-branch"
            echo "##vso[task.logissue type=warning]CLEAN_BRANCH_NAME is empty, defaulting to '${CLEAN_BRANCH_NAME}'."
          fi
          echo "DEBUG: CLEAN_BRANCH_NAME = ${CLEAN_BRANCH_NAME}"

          # --- CRITICAL CHANGE HERE ---
          # API_TAGS will now only contain the actual tags, NOT the full registry/repo path.
          # The Docker@2 task handles prepending $(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME)
          
          # Initialize tags with immutable Git SHA (comma-separated)
          API_TAGS="${SHORT_SHA}"
          FRONTEND_TAGS="${SHORT_SHA}"
          echo "DEBUG: Initial API Tags (SHA): ${API_TAGS}"
          echo "DEBUG: Initial Frontend Tags (SHA): ${FRONTEND_TAGS}"

          # Add branch-specific tags
          API_TAGS="${API_TAGS},${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_TAGS},${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          echo "DEBUG: API Tags (with branch-SHA): ${API_TAGS}"
          echo "DEBUG: Frontend Tags (with branch-SHA): ${FRONTEND_TAGS}"

          # Add additional tags based on push type (semantic versions for releases, 'latest')
          if [[ "$(Build.SourceBranch)" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "$(Build.SourceBranch)" | sed 's/refs\/tags\/v//')
            API_TAGS="${API_TAGS},${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},${VERSION_TAG}"
            echo "Detected Git tag push, adding semantic version tag: ${VERSION_TAG}"

            API_TAGS="${API_TAGS},latest"
            FRONTEND_TAGS="${FRONTEND_TAGS},latest"
            echo "Adding 'latest' tag for release."
          elif [[ "$(Build.SourceBranchName)" == "main" ]]; then
            API_TAGS="${API_TAGS},latest-main"
            FRONTEND_TAGS="${FRONTEND_TAGS},latest-main"
            echo "Main branch build, adding 'latest-main' tag."
          fi

          echo "Generated API Tags (Final for Docker@2): $API_TAGS"
          echo "Generated Frontend Tags (Final for Docker@2): $FRONTEND_TAGS"

          # Set output variables

          echo "##vso[task.setvariable variable=apiImageTags;isOutput=true]$API_TAGS"
          echo "##vso[task.setvariable variable=frontendImageTags;isOutput=true]$FRONTEND_TAGS"

      displayName: 'Generate Docker Image Tags'
      name: generate_tags 

    - template: ../tasks/docker-build-push.yml
      parameters:
        imageName: '$(API_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/BjjEire.Api/Dockerfile'
        tags: $(generate_tags.apiImageTags)
        arguments: >
          --cache-from $(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):latest

    - template: ../tasks/docker-build-push.yml
      parameters:
        imageName: '$(FRONTEND_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/bjjeire-app/Dockerfile'
        tags: $(generate_tags.frontendImageTags)
        arguments: >
          --cache-from $(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):latest
          --build-arg SERVICES_API_HTTPS_0=$(SERVICES_API_HTTPS_0)
          --build-arg SERVICES_API_HTTP_0=$(SERVICES_API_HTTP_0)

