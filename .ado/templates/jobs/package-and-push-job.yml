    #     scriptType: 'bash'
    #     scriptLocation: 'inlineScript'
    #     inlineScript: |
    #         # Example: Triggering a Defender for Cloud scan on a specific image
    #         # Replace with actual scan command/tool (e.g., Trivy, Azure Defender for Cloud)
    #         # This is a placeholder, as actual scanning depends on your chosen tool and setup.
    #         echo "Triggering vulnerability scan for $(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):$(Build.SourceVersion)"
    #         # az acr scan --registry $(AZURE_CONTAINER_REGISTRY_SHORT_NAME) --image $(API_IMAGE_NAME):$(Build.SourceVersion)
            
    #         echo "Triggering vulnerability scan for $(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(Build.SourceVersion)"
    #         # az acr scan --registry $(AZURE_CONTAINER_REGISTRY_SHORT_NAME) --image $(FRONTEND_IMAGE_NAME):$(Build.SourceVersion)
            
    #         # For integrated Azure Defender for Cloud, scans happen automatically on push
    #         # but you might want to query results or integrate with other tools.

    - script: |
        echo "Logging out from Docker registry"
        docker logout $(AZURE_CONTAINER_REGISTRY)
      displayName: 'Docker Logout (Good Practice)'
      condition: always()