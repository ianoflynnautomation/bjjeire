      # Generate Docker tags dynamically
    - script: |
          echo "--- Starting Generate Docker Image Tags Script ---"

          # Validate AZURE_CONTAINER_REGISTRY (though it will be unmasked at runtime for the script)
          if [ -z "$(AZURE_CONTAINER_REGISTRY)" ]; then
            echo "##vso[task.logissue type=error]AZURE_CONTAINER_REGISTRY variable is not set or empty. This is critical for tagging."
            exit 1
          fi
          # Check for accidental trailing slash (good practice)
          if [[ "$(AZURE_CONTAINER_REGISTRY)" == *"/" ]]; then
            echo "##vso[task.logissue type=warning]AZURE_CONTAINER_REGISTRY has a trailing slash. It's recommended to remove it in variable definition."
            # Optionally, you can self-correct here if you prefer, but it's cleaner in variable definition
            # AZURE_CONTAINER_REGISTRY=$(echo "$(AZURE_CONTAINER_REGISTRY)" | sed 's/\/$//')
          fi

          # Get short Git commit SHA for immutable tagging (first 7 characters for brevity)
          SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
          if [ -z "$SHORT_SHA" ]; then
            echo "##vso[task.logissue type=error]SHORT_SHA could not be determined from Build.SourceVersion. Exiting."
            exit 1
          fi
          echo "DEBUG: Build.SourceVersion = $(Build.SourceVersion)"
          echo "DEBUG: SHORT_SHA = ${SHORT_SHA}"

          # Clean branch name for use in tags (removes prefixes, converts slashes to hyphens, to lowercase, removes invalid chars)
          CLEAN_BRANCH_NAME=$(echo "$(Build.SourceBranch)" | \
              sed 's/^refs\/heads\///g' | \
              sed 's/^refs\/pull\///g' | \
              sed 's/^refs\/tags\///g' | \
              tr '/' '-' | \
              tr '[:upper:]' '[:lower:]' | \
              sed 's/[^a-z0-9\.-]//g' ) # Allow dots and hyphens in the cleaned name
          
          if [ -z "$CLEAN_BRANCH_NAME" ]; then
            CLEAN_BRANCH_NAME="unknown-branch" # Fallback if cleaning results in empty string
            echo "##vso[task.logissue type=warning]CLEAN_BRANCH_NAME is empty after sanitization, defaulting to '${CLEAN_BRANCH_NAME}'."
          fi
          echo "DEBUG: Build.SourceBranch = $(Build.SourceBranch)"
          echo "DEBUG: CLEAN_BRANCH_NAME = ${CLEAN_BRANCH_NAME}"

          # Construct base tag prefixes with the full registry name
          API_BASE_TAG_PREFIX="$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME)"
          FRONTEND_BASE_TAG_PREFIX="$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME)"
          echo "DEBUG: API_BASE_TAG_PREFIX = ${API_BASE_TAG_PREFIX}"
          echo "DEBUG: FRONTEND_BASE_TAG_PREFIX = ${FRONTEND_BASE_TAG_PREFIX}"

          # Initialize tags with immutable Git SHA (comma-separated for Docker@2 task)
          API_TAGS="${API_BASE_TAG_PREFIX}:${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_BASE_TAG_PREFIX}:${SHORT_SHA}"
          echo "DEBUG: Initial API Tags (SHA): ${API_TAGS}"
          echo "DEBUG: Initial Frontend Tags (SHA): ${FRONTEND_TAGS}"

          # Add branch-specific tags for development traceability
          API_TAGS="${API_TAGS},${API_BASE_TAG_PREFIX}:${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND_BASE_TAG_PREFIX}:${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          echo "DEBUG: API Tags (with branch-SHA): ${API_TAGS}"
          echo "DEBUG: Frontend Tags (with branch-SHA): ${FRONTEND_TAGS}"

          # Add additional tags based on push type (e.g., semantic versions for releases, 'latest')
          if [[ "$(Build.SourceBranch)" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "$(Build.SourceBranch)" | sed 's/refs\/tags\/v//')
            API_TAGS="${API_TAGS},${API_BASE_TAG_PREFIX}:${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND_BASE_TAG_PREFIX}:${VERSION_TAG}"
            echo "Detected Git tag push, adding semantic version tag: ${VERSION_TAG}"

            # For formal release tags, consider also tagging as 'latest'.
            # Recommendation: Be explicit in production deployments (e.g., use the SemVer tag).
            API_TAGS="${API_TAGS},${API_BASE_TAG_PREFIX}:latest"
            FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND_BASE_TAG_PREFIX}:latest"
            echo "Adding 'latest' tag for release."
          elif [[ "$(Build.SourceBranchName)" == "main" ]]; then
            # For main branch builds, tag as 'latest-main' for development/staging environments
            API_TAGS="${API_TAGS},${API_BASE_TAG_PREFIX}:latest-main"
            FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND_BASE_TAG_PREFIX}:latest-main"
            echo "Main branch build, adding 'latest-main' tag."
          fi

          echo "Generated API Tags (Final for Docker@2): $API_TAGS"
          echo "Generated Frontend Tags (Final for Docker@2): $FRONTEND_TAGS"

          # Set output variables for subsequent steps (e.g., Docker@2 task)
          echo "##vso[task.setvariable variable=apiImageTags;isOutput=true]$API_TAGS"
          echo "##vso[task.setvariable variable=frontendImageTags;isOutput=true]$FRONTEND_TAGS"
      displayName: 'Generate Docker Image Tags'
      name: generate_tags 

    - script: |
        echo "API_IMAGE_NAME: $(API_IMAGE_NAME)"
        echo "AZURE_CONTAINER_REGISTRY: $(AZURE_CONTAINER_REGISTRY)"
        echo "build.SourceBranchName: $(Build.SourceBranchName)"
        echo "build.SourceVersion: $(Build.SourceVersion)"
        echo "Final API Tags being sent to Docker: $(generate_tags.apiImageTags)"
      displayName: 'Debug Tag Variables'

    - task: Docker@2
      displayName: 'Build and Push API Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(API_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/BjjEire.Api/Dockerfile'
        containerRegistry: '$(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)'
        tags: $(generate_tags.apiImageTags)
        buildContext: '.'
        # cacheFrom: 'youracrname.azurecr.io/bjjeire-api:latest' # Example for pulling cache from an existing image

    - task: Docker@2
      displayName: 'Build and Push Frontend Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(FRONTEND_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/bjjeire-app/Dockerfile'
        containerRegistry: '$(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)'
        tags: $(generate_tags.frontendImageTags)
        buildContext: '.'
        # cacheFrom: 'youracrname.azurecr.io/bjjeire-frontend:latest' # Example for pulling cache from an existing image

