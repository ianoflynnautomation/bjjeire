parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 30
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  steps:
    - checkout: self
      fetchDepth: 0

    - task: AzureCLI@2
      displayName: 'Azure Login (Workload Identity Federation)'
      inputs:
        azureSubscription: 'AzureServiceConnectionWIF'
        scriptType: 'bash'  
        scriptLocation: 'inlineScript'
        inlineScript: |
            echo "Attempting to log into Azure..."
            az account show > /dev/null 2>&1
            if [ $? -eq 0 ]; then
                echo "##vso[task.logissue type=warning]Already logged in, skipping re-authentication."
            else
                echo "Successfully logged into Azure via Service Connection."
            fi
      env:
        AZURE_CLIENT_ID: $(AZURE-APP-CLIENT-ID)
        AZURE_TENANT_ID: $(AZURE-TENANT-ID)
        AZURE_SUBSCRIPTION_ID: $(AZURE-SUBSCRIPTION-ID)

    - task: AzureCLI@2
      displayName: 'ACR Login (via Azure CLI)'
      inputs:
        azureSubscription: 'AzureServiceConnectionWIF'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
            az acr login --name $(AZURE_CONTAINER_REGISTRY_SHORT_NAME)
            echo "Logged into ACR: $(AZURE_CONTAINER_REGISTRY_SHORT_NAME)"

      # Generate Docker tags dynamically
    - script: |
          # Initialize tags with common build identifiers
          # Always include branch name and source version for traceability
          API_TAGS="$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):$(Build.SourceBranchName),$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):$(Build.SourceVersion)"
          FRONTEND_TAGS="$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(Build.SourceBranchName),$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(Build.SourceVersion)"

          # Add additional tags based on push type (e.g., semantic versions for releases, 'latest')
          if [[ "$(Build.SourceBranch)" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "$(Build.SourceBranch)" | sed 's/refs\/tags\/v//')
            API_TAGS="${API_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):${VERSION_TAG}"
            echo "Detected tag push, adding semantic version tag: ${VERSION_TAG}"

            # If it's a main branch or a release tag, also tag as 'latest'
            # Adjust this logic based on YOUR definition of 'latest'
            if [[ "$(Build.SourceBranchName)" == "main" || "$(Build.SourceBranch)" == "refs/tags/v"* ]]; then
              API_TAGS="${API_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):latest"
              FRONTEND_TAGS="${FRONTEND_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):latest"
              echo "Adding 'latest' tag."
            fi
          elif [[ "$(Build.SourceBranchName)" == "main" ]]; then
            # For main branch builds that are not a tag push, you might still want a 'latest' tag for dev/staging
            API_TAGS="${API_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(API_IMAGE_NAME):latest-dev" # or just 'latest' if main is always deployable
            FRONTEND_TAGS="${FRONTEND_TAGS},$(AZURE_CONTAINER_REGISTRY)/$(FRONTEND_IMAGE_NAME):latest-dev"
            echo "Main branch build, adding 'latest-dev' tag."
          fi

          echo "Generated API Tags: $API_TAGS"
          echo "Generated Frontend Tags: $FRONTEND_TAGS"

          echo "##vso[task.setvariable variable=apiImageTags;isOutput=true]$API_TAGS"
          echo "##vso[task.setvariable variable=frontendImageTags;isOutput=true]$FRONTEND_TAGS"
      displayName: 'Generate Docker Image Tags'
      name: generate_tags

