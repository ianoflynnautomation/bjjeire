parameters:
  dependsOn: []
  condition: 'succeeded()'
  name: ''
  pool:
    vmImage: 'ubuntu-latest'

jobs:
- job: ${{ parameters.name }}
  displayName: ${{ parameters.name }}
  timeoutInMinutes: 30
  cancelTimeoutInMinutes: 2
  dependsOn: ${{ parameters.dependsOn }}
  condition: ${{ parameters.condition }}
  pool: ${{ parameters.pool }}

  steps:
    - checkout: self
      fetchDepth: 0

    # - task: AzureCLI@2
    #   displayName: 'Azure Login (Workload Identity Federation)'
    #   inputs:
    #     azureSubscription: 'AzureServiceConnectionWIF'
    #     scriptType: 'bash'  
    #     scriptLocation: 'inlineScript'
    #     inlineScript: |
    #         echo "Attempting to log into Azure..."
    #         az account show > /dev/null 2>&1
    #         if [ $? -eq 0 ]; then
    #             echo "##vso[task.logissue type=warning]Already logged in, skipping re-authentication."
    #         else
    #             echo "Successfully logged into Azure via Service Connection."
    #         fi
    #   env:
    #     AZURE_CLIENT_ID: $(AZURE-APP-CLIENT-ID)
    #     AZURE_TENANT_ID: $(AZURE-TENANT-ID)
    #     AZURE_SUBSCRIPTION_ID: $(AZURE-SUBSCRIPTION-ID)


    - script: |
          echo "##vso[task.group]Generate Docker Image Tags"

          # Get short Git commit SHA for immutable tagging
          SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
          if [ -z "$SHORT_SHA" ]; then
            echo "##vso[task.logissue type=error;sourcepath=Build.SourceVersion]Git short SHA could not be determined from Build.SourceVersion. Ensure fetchDepth is sufficient (e.g., fetchDepth: 0)."
            exit 1
          fi
          echo "##vso[task.setvariable variable=ShortShaForLogs;isSecret=false]${SHORT_SHA}" # For easier visibility in logs if not masked

          # Clean branch name for use in tags (remove prefixes, convert slashes to hyphens, lowercase, remove invalid chars)
          CLEAN_BRANCH_NAME=$(echo "$(Build.SourceBranch)" | \
              sed 's/^refs\/heads\///g' | \
              sed 's/^refs\/pull\///g' | \
              sed 's/^refs\/tags\///g' | \
              tr '/' '-' | \
              tr '[:upper:]' '[:lower:]' | \
              sed 's/[^a-z0-9\.-]//g' )
          
          if [ -z "$CLEAN_BRANCH_NAME" ]; then
            CLEAN_BRANCH_NAME="unknown-branch"
            echo "##vso[task.logissue type=warning]Cleaned branch name is empty, defaulting to '${CLEAN_BRANCH_NAME}'. Build.SourceBranch: '$(Build.SourceBranch)'"
          fi

          # Initialize tags with immutable Git SHA (comma-separated for Docker@2 task)
          API_TAGS="${SHORT_SHA}"
          FRONTEND_TAGS="${SHORT_SHA}"
          echo "##vso[task.debug]Base tags (SHA): API=${API_TAGS}, Frontend=${FRONTEND_TAGS}"

          # Add branch-specific tags for traceability
          API_TAGS="${API_TAGS},${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_TAGS},${CLEAN_BRANCH_NAME}-${SHORT_SHA}"
          echo "##vso[task.debug]Tags after branch-SHA: API=${API_TAGS}, Frontend=${FRONTEND_TAGS}"

          # Add additional tags based on push type (semantic versions for releases, 'latest')
          if [[ "$(Build.SourceBranch)" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "$(Build.SourceBranch)" | sed 's/refs\/tags\/v//')
            API_TAGS="${API_TAGS},${VERSION_TAG}"
            FRONTEND_TAGS="${FRONTEND_TAGS},${VERSION_TAG}"
            echo "##vso[task.debug]Detected Git tag push. Adding semantic version tag: ${VERSION_TAG}"

            API_TAGS="${API_TAGS},latest"
            FRONTEND_TAGS="${FRONTEND_TAGS},latest"
            echo "##vso[task.debug]Adding 'latest' tag for release builds."
          elif [[ "$(Build.SourceBranchName)" == "main" ]]; then
            API_TAGS="${API_TAGS},latest-main"
            FRONTEND_TAGS="${FRONTEND_TAGS},latest-main"
            echo "##vso[task.debug]Main branch build. Adding 'latest-main' tag."
          fi

          echo "##vso[task.debug]Final Generated API Tags for Docker@2: ${API_TAGS}"
          echo "##vso[task.debug]Final Generated Frontend Tags for Docker@2: ${FRONTEND_TAGS}"

          # Set output variables for subsequent steps (e.g., Docker@2 task)
          # These output variables contain the comma-separated tag strings (without registry/repo prefix).
          echo "##vso[task.setvariable variable=apiImageTags;isOutput=true]$API_TAGS"
          echo "##vso[task.setvariable variable=frontendImageTags;isOutput=true]$FRONTEND_TAGS"

          echo "##vso[task.groupend]" # Ends the log group
      displayName: 'Generate Docker Image Tags'
      name: generate_tags

    - template: ../tasks/docker-build-push.yml
      parameters:
        imageName: '$(API_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/BjjEire.Api/Dockerfile'
        tags: $(generate_tags.apiImageTags)

    - template: ../tasks/docker-build-push.yml
      parameters:
        imageName: '$(FRONTEND_IMAGE_NAME)'
        dockerfile: '$(Build.SourcesDirectory)/src/bjjeire-app/Dockerfile'
        tags: $(generate_tags.frontendImageTags)

    # - task: AzureCLI@2
