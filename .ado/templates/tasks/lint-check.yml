parameters:
  - name: dotnetVersion
    type: string
    default: '6.x'
  - name: nodeVersion
    type: string
    default: '18.x'
  - name: workingDirectory
    type: string
    default: '.'

steps:
  - template: setup-dotnet.yml
    parameters:
      dotnetVersion: ${{ parameters.dotnetVersion }}

  - task: DotNetCoreCLI@2
    displayName: 'Check .NET Code Formatting'
    inputs:
      command: 'custom'
      custom: 'format'
      arguments: 'BjjEire.sln --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic'

  - task: NodeTool@0
    displayName: 'Setup Node.js ${{ parameters.nodeVersion }}'
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}
      checkLatest: true

  - script: |
      npm ci
      npm run lint
    displayName: 'Run React Linter'
    workingDirectory: '${{ parameters.workingDirectory }}'