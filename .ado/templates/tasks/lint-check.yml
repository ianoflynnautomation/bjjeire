parameters:
  - name: dotnetVersion
    type: string
    default: '10.x'
  - name: nodeVersion
    type: string
    default: '22.x'
  - name: workingDirectory
    type: string
    default: '.'

steps:
  - template: setup-dotnet.yml
    parameters:
      dotnetVersion: ${{ parameters.dotnetVersion }}

  - task: DotNetCoreCLI@2
    displayName: 'Check .NET Code Formatting'
    inputs:
      command: 'custom'
      custom: 'format'
      arguments: 'BjjEire.sln --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic'

  - task: NodeTool@0
    displayName: 'Setup Node.js ${{ parameters.nodeVersion }}'
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}
      checkLatest: false

  - script: |
      npm ci
    displayName: 'Install Node Dependencies'
    workingDirectory: '${{ parameters.workingDirectory }}'

  - script: |
      npx tsc --noEmit
    displayName: 'TypeScript Type Check'
    workingDirectory: '${{ parameters.workingDirectory }}'

  - script: |
      npx eslint src --max-warnings 0
    displayName: 'ESLint Check'
    workingDirectory: '${{ parameters.workingDirectory }}'

  - script: |
      npx prettier --check src/
    displayName: 'Prettier Format Check'
    workingDirectory: '${{ parameters.workingDirectory }}'
