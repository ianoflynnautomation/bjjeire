parameters:
  - name: dotnetVersion
    type: string
    default: '6.x'
  - name: path
    type: string
    default: ''
  - name: configuration
    type: string
    default: 'Release'

steps:
  - template: setup-dotnet.yml
    parameters:
      dotnetVersion: ${{ parameters.dotnetVersion }}

  - task: DotNetCoreCLI@2
    displayName: 'Restore Dependencies'
    inputs:
      command: 'restore'
      projects: '${{ parameters.path }}'

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: 'build'
      projects: '${{ parameters.path }}'
      arguments: '--configuration ${{ parameters.configuration }} --no-restore'