parameters:
  - name: dotnetVersion
    type: string
    default: '6.x'
  - name: testArtifactName
    type: string
    default: ''
  - name: testAssemblyPattern
    type: string
    default: '*Tests.dll'
  - name: testResultsNamePrefix
    type: string
    default: 'TestResults'
  - name: testFilterCriteria
    type: string
    default: ''
  - name: downloadPath
    type: string
    default: '$(Build.SourcesDirectory)/test_artifacts'

steps:
  - task: DownloadPipelineArtifact@2
    displayName: 'Download Test Artifact - ${{ parameters.testArtifactName }}'
    inputs:
      buildType: 'current'
      artifact: ${{ parameters.testArtifactName }}
      patterns:  ${{ parameters.testAssemblyPattern }}}
      targetPath: '${{ parameters.downloadPath }}/${{ parameters.testArtifactName }}'

  - script: |
      TEST_RESULTS_DIR="$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}"
      mkdir -p "$TEST_RESULTS_DIR"

      dotnet test "**\*Tests.dll" \
      --logger "trx;LogFileName=${{ parameters.testResultsNamePrefix }}.trx" \
      --results-directory "$TEST_RESULTS_DIR" \
      ${{ parameters.testFilterCriteria }}
    displayName: 'Run Tests'
    workingDirectory: '${{ parameters.downloadPath }}/${{ parameters.testArtifactName }}'

  # - task: VSTest@2
  #   inputs:
  #     testSelector: 'testAssemblies'
  #     testAssemblyVer2: |
  #       ${{ parameters.testAssemblyPattern }}
  #       !**\*TestAdapter.dll
  #       !**\obj\**
  #     searchFolder: '${{ parameters.downloadPath }}/${{ parameters.testArtifactName }}'
  #     testFiltercriteria: ${{ parameters.testFilterCriteria }}
  #     codeCoverageEnabled: true
  #     resultsFolder: '$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}'
  #     # runSettingsFile: ${{ parameters.runSettingsFile }}
  #     uiTests: false
  #     rerunFailedTests: true
  #     rerunMaxAttempts: 1
  #     rerunType: 'basedOnTestFailurePercentage'
  #     rerunFailedThreshold: '30'
  #     # distributionBatchType, batchingBasedOnAgentsOption, customBatchSizeValue -> make possible to rerun every test even forbidden characters
  #     distributionBatchType: 'basedOnTestCases'
  #     batchingBasedOnAgentsOption: 'customBatchSize'
  #     customBatchSizeValue: '10000'

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}/*.trx'
      mergeResults: true
      testRunTitle: '${{ parameters.testResultsNamePrefix }} Tests'

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results Artifact'
    condition: always()
    inputs:
      pathToPublish: '$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}'
      artifactName: 'test_results_${{ parameters.testResultsNamePrefix }}'