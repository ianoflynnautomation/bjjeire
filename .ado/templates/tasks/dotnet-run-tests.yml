parameters:
  - name: dotnetVersion
    type: string
    default: '10.x'
  - name: testArtifactName
    type: string
    default: ''
  - name: testAssemblyPattern
    type: string
    default: '*Tests.dll'
  - name: testResultsNamePrefix
    type: string
    default: 'TestResults'
  - name: testFilterCriteria
    type: string
    default: ''
  - name: downloadPath
    type: string
    default: '$(Build.SourcesDirectory)/test_artifacts'

steps:
  - task: UseDotNet@2
    displayName: 'Setup .NET SDK ${{ parameters.dotnetVersion }}'
    inputs:
      version: ${{ parameters.dotnetVersion }}
      packageType: 'sdk'

  - task: DownloadPipelineArtifact@2
    displayName: 'Download Test Artifact - ${{ parameters.testArtifactName }}'
    inputs:
      buildType: 'current'
      artifact: ${{ parameters.testArtifactName }}
      patterns:  ${{ parameters.testAssemblyPattern }}
      targetPath: '${{ parameters.downloadPath }}/${{ parameters.testArtifactName }}'

  - script: |
      TEST_RESULTS_DIR="$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}"
      mkdir -p "$TEST_RESULTS_DIR"
      mapfile -t DLLS < <(find '${{ parameters.downloadPath }}/${{ parameters.testArtifactName }}' -name '*Tests.dll' ! -path '*/ref/*')
      dotnet vstest "${DLLS[@]}" \
        --logger:"trx;LogFileName=${{ parameters.testResultsNamePrefix }}.trx" \
        --ResultsDirectory:"$TEST_RESULTS_DIR" \
        ${TEST_FILTER:+--TestCaseFilter:"$TEST_FILTER"}
    displayName: 'Run Tests'
    env:
      TEST_FILTER: ${{ parameters.testFilterCriteria }}

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/*.trx'
      searchFolder: '$(Agent.TempDirectory)'
      mergeResults: true
      testRunTitle: '${{ parameters.testResultsNamePrefix }} Tests'
      failTaskOnFailedTests: true

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results Artifact'
    condition: succeededOrFailed()
    inputs:
      pathToPublish: '$(Agent.TempDirectory)/TestResults/${{ parameters.testResultsNamePrefix }}'
      artifactName: 'test_results_${{ parameters.testResultsNamePrefix }}'