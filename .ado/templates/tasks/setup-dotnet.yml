parameters:
  - name: dotnetVersion
    type: string
    default: '9.x'

steps:
  - task: UseDotNet@2
    displayName: 'Setup .NET SDK ${{ parameters.dotnetVersion }}'
    inputs:
      version: ${{ parameters.dotnetVersion }}
      packageType: 'sdk'

  - task: DotNetCoreCLI@2
    displayName: 'Restore NuGet packages'
    inputs:
      command: 'restore'
      projects: '**/*.csproj'
