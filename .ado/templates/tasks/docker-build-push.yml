parameters:
  - name: imageName
    type: string
  - name: dockerfile
    type: string
  - name: tags
    type: string

steps:
  - task: Docker@2
    displayName: 'Build and Push ${{ parameters.imageName }}'
    inputs:
      command: 'buildAndPush'
      repository: '${{ parameters.imageName }}'
      dockerfile: '${{ parameters.dockerfile }}'
      containerRegistry: '$(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)'
      tags: ${{ parameters.tags }}
      buildContext: '.'
      cacheFrom: '$(AZURE_CONTAINER_REGISTRY)/${{ parameters.imageName }}:latest'