name: "Lint Frontend"
description: "Runs TypeScript type check and ESLint on the React app. Must run inside a container job that provides Node.js."
inputs:
  node-version:
    description: "Informational. Node is provided by the container image."
    required: false
    default: ''
  working-directory:
    description: "Directory of the React application (where package.json is)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache node_modules
      uses: ./.github/actions/setup-node
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Install Node Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: TypeScript Type Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx tsc --noEmit

    - name: ESLint Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx eslint src --max-warnings 0

    - name: Prettier Format Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx prettier --check src/
