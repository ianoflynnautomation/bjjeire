name: "Lint Frontend"
description: "Runs TypeScript type check and ESLint on the React app"
inputs:
  node-version:
    description: "Node.js version"
    required: true
  working-directory:
    description: "Directory of the React application (where package.json is)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: "${{ inputs.working-directory }}/package-lock.json"

    - name: Install Node Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: TypeScript Type Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx tsc --noEmit

    - name: ESLint Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx eslint src --max-warnings 0
