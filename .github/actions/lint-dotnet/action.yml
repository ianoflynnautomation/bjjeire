name: "Lint .NET"
description: "Checks .NET whitespace and style formatting. Must run inside a container job that provides the .NET SDK."
inputs:
  dotnet-version:
    description: "Informational. SDK is provided by the container image."
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Cache NuGet packages
      uses: ./.github/actions/setup-dotnet

    - name: Check .NET Code Formatting
      shell: bash
      run: |
        dotnet format whitespace BjjEire.sln --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic
        dotnet format style BjjEire.sln --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic
