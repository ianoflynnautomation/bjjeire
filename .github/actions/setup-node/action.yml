name: 'Setup Node Cache'
description: 'Caches node_modules / npm. Assumes Node is already present (container job).'
inputs:
  node-version:
    description: 'Informational. Retained for backwards compatibility — Node is provided by the container image.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for caching key'
    required: false
    default: '.'
runs:
  using: "composite"
  steps:
    - name: Cache Node modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      id: node_cache
      with:
        path: ${{ inputs.working-directory }}/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory), format('{0}/yarn.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-node-
