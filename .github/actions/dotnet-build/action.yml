name: "Build .NET Project/Solution"
description: "Restores dependencies and builds a .NET solution or project"
inputs:
  dotnet-version:
    description: "The .NET SDK version"
    required: true
  path:
    description: "Path to the .NET solution or project file"
    required: true
  configuration:
    description: "Build configuration (e.g., Release, Debug)"
    required: false
    default: "Release"
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: ./.github/actions/setup-dotnet
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore Dependencies
      shell: bash
      run: dotnet restore "${{ inputs.path }}"

    - name: Build
      shell: bash
      run: dotnet build "${{ inputs.path }}" --configuration ${{ inputs.configuration }} --no-restore
