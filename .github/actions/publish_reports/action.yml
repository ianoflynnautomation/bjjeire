name: "Publish Reports"
description: "Downloads all test artifacts and publishes a test results summary"
inputs:
  download-path:
    description: "Path to download the artifact"
    required: false
    default: "test_artifacts"

runs:
  using: "composite"
  steps:
    - name: Download all workflow artifacts
      uses: actions/download-artifact@v4
      with:
        path: ${{ inputs.download-path }}

    - name: Publish Test Results Summary
      uses: dorny/test-reporter@v2
      with:
        name: Test Results
        path: "${{ inputs.download-path }}/**/*.trx"
        reporter: dotnet-trx
        fail-on-error: true
