name: 'Test React Application (Unit)'
description: 'Installs dependencies and runs Vitest unit tests (jsdom)'
inputs:
  node-version:
    description: 'Node.js version'
    required: true
  working-directory:
    description: 'Directory of the React application (where package.json is)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Node.js and Cache
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ inputs.node-version }}
        working-directory: ${{ inputs.working-directory }}

    - name: Install Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Run Unit Tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm test

