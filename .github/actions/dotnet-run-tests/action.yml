name: 'Run .NET Tests'
description: 'Restores, builds, and runs .NET tests for a specific project'
inputs:
  dotnet-version:
    description: '.NET SDK version'
    required: true
  project-path:
    description: 'Path to the .NET test project file (csproj)'
    required: true
  test-results-name-prefix:
    description: 'Prefix for the TRX test results file and artifact name'
    required: true
  test-filter-criteria:
    description: 'Filter criteria for dotnet test (e.g. Category!=Ignore)'
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: ./.github/actions/setup-dotnet
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Run Tests
      shell: bash
      run: |
        FILTER_ARG=""
        if [ -n "${{ inputs.test-filter-criteria }}" ]; then
          FILTER_ARG="--filter ${{ inputs.test-filter-criteria }}"
        fi
        dotnet test "${{ inputs.project-path }}" \
          --configuration Release \
          --logger "trx;LogFileName=${{ inputs.test-results-name-prefix }}.trx" \
          --results-directory "${{ github.workspace }}/TestResults/${{ inputs.test-results-name-prefix }}" \
          $FILTER_ARG

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test_results_${{ inputs.test-results-name-prefix }}
        path: "${{ github.workspace }}/TestResults/${{ inputs.test-results-name-prefix }}"
        retention-days: 1
