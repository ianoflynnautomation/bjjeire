name: 'Build React Application'
description: 'Installs dependencies and builds a React application'
inputs:
  node-version:
    description: 'Node.js version'
    required: true
  working-directory:
    description: 'Directory of the React application (where package.json is)'
    required: true
  build-output-path:
    description: 'Path to the built React app (e.g., build, dist)'
    required: false
    default: 'dist'
  build-artifact-name:
    description: 'Name for the uploaded build artifact (if any)'
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup Node.js and Cache
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ inputs.node-version }}
        working-directory: ${{ inputs.working-directory }}

    - name: Install Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Build Application
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run build

    - name: Upload React Build Artifact
      if: ${{ inputs.build-artifact-name != '' && inputs.build-output-path != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.build-artifact-name }}
        path: ${{ inputs.working-directory }}/${{ inputs.build-output-path }}
        retention-days: 7