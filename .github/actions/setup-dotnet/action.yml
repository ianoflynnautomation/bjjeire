name: 'Setup .NET Cache'
description: 'Caches NuGet packages. Assumes the .NET SDK is already present (container job).'
inputs:
  dotnet-version:
    description: 'Informational. Retained for backwards compatibility — the SDK is provided by the container image.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
