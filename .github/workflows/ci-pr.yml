name: CI PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "24.x"
  DOTNET_CONTAINER: "mcr.microsoft.com/dotnet/sdk:10.0"
  NODE_CONTAINER: "node:24-bookworm-slim"
  PLAYWRIGHT_CONTAINER: "mcr.microsoft.com/playwright:v1.59.1-noble"
  SOLUTION_PATH: "BjjEire.sln"
  REACT_APP_PATH: "src/bjjeire-app"
  CONFIGURATION: Release

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            api:
              - 'src/BjjEire*/**'
              - 'tests/**'
              - '*.sln'
              - 'Directory.*.props'
            frontend:
              - 'src/bjjeire-app/**'

  lint_api:
    name: Lint .NET
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-dotnet
      - name: Check .NET code formatting
        shell: bash
        run: |
          dotnet format whitespace ${{ env.SOLUTION_PATH }} --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic
          dotnet format style ${{ env.SOLUTION_PATH }} --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic

  lint_frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: TypeScript type check
        shell: bash
        run: npx tsc --noEmit
      - name: ESLint check
        shell: bash
        run: npx eslint src --max-warnings 0
      - name: Prettier format check
        shell: bash
        run: npx prettier --check src/

  build_dotnet_solution:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 15
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-dotnet
      - name: Restore dependencies
        shell: bash
        run: dotnet restore "${{ env.SOLUTION_PATH }}"
      - name: Build
        id: build_step
        shell: bash
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration ${{ env.CONFIGURATION }} --no-restore

  test_dotnet_unit:
    name: Test .NET Unit
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: ApiUnitTests
            project-path: "tests/BjjEire.Api.UnitTests/BjjEire.Api.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: DomainUnitTests
            project-path: "tests/BjjEire.Domain.UnitTests/BjjEire.Domain.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApplicationUnitTests
            project-path: "tests/BjjEire.Application.UnitTests/BjjEire.Application.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: InfrastructureUnitTests
            project-path: "tests/BjjEire.Infrastructure.UnitTests/BjjEire.Infrastructure.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          test-results-name-prefix: ${{ matrix.test-type }}
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  test_dotnet_integration:
    name: Test .NET Integration
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: [build_dotnet_solution, test_dotnet_unit, lint_api]
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: ApplicationIntegrationTests
            project-path: "tests/BjjEire.Application.IntegrationTests/BjjEire.Application.IntegrationTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApiIntegrationTests
            project-path: "tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj"
            test-filter-criteria: "Category!=Ignore"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          test-results-name-prefix: ${{ matrix.test-type }}
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  publish_openapi_contract:
    name: Publish OpenAPI Contract
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: [build_dotnet_solution, test_dotnet_unit, lint_api]
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-dotnet
      - name: Generate OpenAPI contract artifact
        shell: bash
        env:
          OPENAPI_ARTIFACT_PATH: ${{ github.workspace }}/artifacts/openapi/openapi-v1.json
        run: |
          dotnet test tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj \
            --configuration ${{ env.CONFIGURATION }} \
            --filter "Feature=OpenApi&FullyQualifiedName~OpenApiDocument_ShouldBeAvailableInTestHostAndDescribePublicApiContractsAsync"
          test -s "$OPENAPI_ARTIFACT_PATH"
      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: openapi-v1-json
          path: ${{ github.workspace }}/artifacts/openapi/openapi-v1.json
          if-no-files-found: error
          retention-days: 30

  check_openapi_compatibility:
    name: Check OpenAPI Compatibility
    runs-on: ubuntu-latest
    needs: [build_dotnet_solution, test_dotnet_unit, lint_api]
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 25
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: current
      - name: Checkout base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - name: Generate base OpenAPI contract
        id: base_contract
        shell: bash
        working-directory: base
        env:
          OPENAPI_ARTIFACT_PATH: ${{ github.workspace }}/artifacts/openapi/base-openapi-v1.json
        run: |
          if ! grep -R "OPENAPI_ARTIFACT_PATH" -n tests/BjjEire.Api.IntegrationTests/OpenApiContractTests >/dev/null 2>&1; then
            echo "Base branch does not have artifact-generating OpenAPI tests yet; skipping compatibility check for this PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -v "$HOME/.nuget/packages:/root/.nuget/packages" \
            -w "${{ github.workspace }}/base" \
            -e OPENAPI_ARTIFACT_PATH \
            ${{ env.DOTNET_CONTAINER }} \
            dotnet test tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj \
              --configuration ${{ env.CONFIGURATION }} \
              --filter "Feature=OpenApi&FullyQualifiedName~OpenApiDocument_ShouldBeAvailableInTestHostAndDescribePublicApiContractsAsync"
      - name: Generate current OpenAPI contract
        if: steps.base_contract.outputs.skip != 'true'
        shell: bash
        working-directory: current
        env:
          OPENAPI_ARTIFACT_PATH: ${{ github.workspace }}/artifacts/openapi/current-openapi-v1.json
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -v "$HOME/.nuget/packages:/root/.nuget/packages" \
            -w "${{ github.workspace }}/current" \
            -e OPENAPI_ARTIFACT_PATH \
            ${{ env.DOTNET_CONTAINER }} \
            dotnet test tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj \
              --configuration ${{ env.CONFIGURATION }} \
              --filter "Feature=OpenApi&FullyQualifiedName~OpenApiDocument_ShouldBeAvailableInTestHostAndDescribePublicApiContractsAsync"
      - name: Compare OpenAPI contracts
        if: steps.base_contract.outputs.skip != 'true'
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/artifacts/openapi:/specs:ro" \
            tufin/oasdiff:v1.14.0 \
            breaking --fail-on ERR --format githubactions \
              /specs/base-openapi-v1.json \
              /specs/current-openapi-v1.json

  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    env:
      HUSKY: "0"
      SERVICES_API_HTTPS_0: "https://api-ci-placeholder:443"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Build
        shell: bash
        run: npm run build

  test_frontend_unit:
    name: Test Frontend Unit
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    env:
      HUSKY: "0"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Run unit tests
        shell: bash
        run: npm test

  test_frontend_integration:
    name: Test Frontend Integration
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: [lint_frontend, build_frontend, test_frontend_unit]
    if: needs.lint_frontend.result == 'success' && needs.build_frontend.result == 'success' && needs.test_frontend_unit.result == 'success'
    timeout-minutes: 10
    env:
      HUSKY: "0"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Run integration tests
        shell: bash
        run: npm run test:integration

  test_frontend_browser:
    name: Test Frontend Browser
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    needs: [lint_frontend, build_frontend, test_frontend_unit]
    if: needs.lint_frontend.result == 'success' && needs.build_frontend.result == 'success' && needs.test_frontend_unit.result == 'success'
    timeout-minutes: 15
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/react-test-browser
        with:
          working-directory: ${{ env.REACT_APP_PATH }}

  publish_reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test_dotnet_integration, test_dotnet_unit]
    if: |
      always() &&
      (needs.test_dotnet_integration.result == 'success' || needs.test_dotnet_integration.result == 'failure') &&
      (needs.test_dotnet_unit.result == 'success' || needs.test_dotnet_unit.result == 'failure')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/publish_reports
