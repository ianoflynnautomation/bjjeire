name: Build & Push to GHCR

on:
  workflow_call:
    inputs:
      push_images:
        description: "Whether to push built images (false = build only)."
        required: false
        type: boolean
        default: true
    outputs:
      api_image_digest:
        description: "Digest (sha256:...) of the pushed API image, if built."
        value: ${{ jobs.build-push-api.outputs.image_digest }}
      frontend_image_digest:
        description: "Digest (sha256:...) of the pushed frontend image, if built."
        value: ${{ jobs.build-push-frontend.outputs.image_digest }}
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push built images to GHCR"
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/bjjeire-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bjjeire-frontend

permissions:
  contents: read
  packages: write
  pull-requests: read
  id-token: write
  attestations: write
  security-events: write

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            api:
              - 'src/BjjEire*/**'
              - 'Directory.*.props'
              - '*.sln'
            frontend:
              - 'src/bjjeire-app/**'

  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || startsWith(github.ref, 'refs/tags/')
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker-container

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./src/BjjEire.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          sbom: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Attest build provenance
        if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-name: ${{ env.API_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # D (commented until cosign is set up): Keyless OIDC image signing with cosign.
      # Publishes a signature to the registry using the ambient GitHub OIDC token —
      # no long-lived keys, Sigstore Rekor transparency log receives the record.
      #
      # - name: Install cosign
      #   if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      #   uses: sigstore/cosign-installer@v3
      #
      # - name: Sign API image (keyless OIDC)
      #   if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      #   env:
      #     COSIGN_EXPERIMENTAL: "1"
      #   run: |
      #     cosign sign --yes "${{ env.API_IMAGE }}@${{ steps.build.outputs.digest }}"

  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/')
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker-container

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push frontend image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./src/bjjeire-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          sbom: ${{ inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            VITE_APP_MSAL_CLIENT_ID=${{ secrets.VITE_APP_MSAL_CLIENT_ID }}
            VITE_APP_MSAL_AUTHORITY=${{ secrets.VITE_APP_MSAL_AUTHORITY }}
            VITE_APP_MSAL_API_SCOPE=${{ secrets.VITE_APP_MSAL_API_SCOPE }}
            VITE_APP_CF_BEACON_TOKEN=${{ secrets.VITE_APP_CF_BEACON_TOKEN }}
            VITE_APP_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_APP_CONTACT_EMAIL=${{ secrets.VITE_APP_CONTACT_EMAIL }}
            VITE_APP_SOCIAL_INSTAGRAM_URL=${{ secrets.VITE_APP_SOCIAL_INSTAGRAM_URL }}
            VITE_APP_SOCIAL_FACEBOOK_URL=${{ secrets.VITE_APP_SOCIAL_FACEBOOK_URL }}
            VITE_APP_GITHUB_URL=${{ secrets.VITE_APP_GITHUB_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Attest build provenance
        if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-name: ${{ env.FRONTEND_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # D (commented until cosign is set up): Keyless OIDC image signing with cosign.
      #
      # - name: Install cosign
      #   if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      #   uses: sigstore/cosign-installer@v3
      #
      # - name: Sign frontend image (keyless OIDC)
      #   if: inputs.push_images && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      #   env:
      #     COSIGN_EXPERIMENTAL: "1"
      #   run: |
      #     cosign sign --yes "${{ env.FRONTEND_IMAGE }}@${{ steps.build.outputs.digest }}"

  scan-images:
    name: Scan ${{ matrix.component }} Image (Trivy)
    runs-on: ubuntu-latest
    needs: [build-push-api, build-push-frontend]
    if: |
      always() &&
      inputs.push_images &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) &&
      (needs.build-push-api.result == 'success' || needs.build-push-frontend.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ghcr.io/${{ github.repository_owner }}/bjjeire-api
          - component: frontend
            image: ghcr.io/${{ github.repository_owner }}/bjjeire-frontend
    steps:
      - name: Resolve image reference
        id: ref
        run: |
          DIGEST="${{ matrix.component == 'api' && needs.build-push-api.outputs.image_digest || needs.build-push-frontend.outputs.image_digest }}"
          if [ -z "$DIGEST" ]; then
            echo "No digest available for ${{ matrix.component }} — skipping scan"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_ref=${{ matrix.image }}@${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ghcr.io
        if: steps.ref.outputs.skip != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        if: steps.ref.outputs.skip != 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ steps.ref.outputs.image_ref }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub code scanning
        if: steps.ref.outputs.skip != 'true'
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}
