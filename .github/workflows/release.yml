name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  HELM_VERSION: "3.16.4"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      api_released: ${{ steps.release.outputs['src/BjjEire.Api--release_created'] }}
      api_tag: ${{ steps.release.outputs['src/BjjEire.Api--tag_name'] }}
      api_version: ${{ steps.release.outputs['src/BjjEire.Api--version'] }}
      frontend_released: ${{ steps.release.outputs['src/bjjeire-app--release_created'] }}
      frontend_tag: ${{ steps.release.outputs['src/bjjeire-app--tag_name'] }}
      frontend_version: ${{ steps.release.outputs['src/bjjeire-app--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api-artifacts:
    name: Publish API NuGet Artifacts
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Pack
        run: >
          dotnet pack src/BjjEire.Api/BjjEire.Api.csproj
          -c Release
          -p:PackageVersion=${{ needs.release-please.outputs.api_version }}
          -o ./artifacts

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.api_tag }}
          files: ./artifacts/*.nupkg

  publish-frontend-artifacts:
    name: Publish Frontend Dist Artifacts
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.frontend_released == 'true'
    env:
      SERVICES_API_HTTPS_0: "https://api-placeholder:443"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        working-directory: src/bjjeire-app
        run: npm ci

      - name: Build
        working-directory: src/bjjeire-app
        env:
          VITE_APP_MSAL_CLIENT_ID: ${{ secrets.VITE_APP_MSAL_CLIENT_ID }}
          VITE_APP_MSAL_AUTHORITY: ${{ secrets.VITE_APP_MSAL_AUTHORITY }}
          VITE_APP_MSAL_API_SCOPE: ${{ secrets.VITE_APP_MSAL_API_SCOPE }}
        run: npm run build

      - name: Archive dist
        run: tar -czf frontend-dist.tar.gz -C src/bjjeire-app dist

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.frontend_tag }}
          files: frontend-dist.tar.gz

  build-push-api-image:
    name: Build & Push API Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/BjjEire.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-api:${{ needs.release-please.outputs.api_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-api:latest
          labels: |
            org.opencontainers.image.title=bjjeire-api
            org.opencontainers.image.version=${{ needs.release-please.outputs.api_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          build-args: |
            APP_VERSION=${{ needs.release-please.outputs.api_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-seeder-image:
    name: Build & Push Seeder Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push seeder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/BjjEire.Seeder/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-seeder:${{ needs.release-please.outputs.api_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-seeder:latest
          labels: |
            org.opencontainers.image.title=bjjeire-seeder
            org.opencontainers.image.version=${{ needs.release-please.outputs.api_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-frontend-image:
    name: Build & Push Frontend Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.frontend_released == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/bjjeire-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-frontend:${{ needs.release-please.outputs.frontend_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-frontend:latest
          labels: |
            org.opencontainers.image.title=bjjeire-frontend
            org.opencontainers.image.version=${{ needs.release-please.outputs.frontend_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          build-args: |
            APP_VERSION=${{ needs.release-please.outputs.frontend_version }}
            VITE_APP_MSAL_CLIENT_ID=${{ secrets.VITE_APP_MSAL_CLIENT_ID }}
            VITE_APP_MSAL_AUTHORITY=${{ secrets.VITE_APP_MSAL_AUTHORITY }}
            VITE_APP_MSAL_API_SCOPE=${{ secrets.VITE_APP_MSAL_API_SCOPE }}
            VITE_APP_CF_BEACON_TOKEN=${{ secrets.VITE_APP_CF_BEACON_TOKEN }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-fetcher-image:
    name: Build & Push Fetcher Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push fetcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/BjjEire.Fetcher/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-fetcher:${{ needs.release-please.outputs.api_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-fetcher:latest
          labels: |
            org.opencontainers.image.title=bjjeire-fetcher
            org.opencontainers.image.version=${{ needs.release-please.outputs.api_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-charts-repo:
    name: Notify Charts Repo of App Release
    runs-on: ubuntu-latest
    needs: [release-please, build-push-api-image, build-push-seeder-image, build-push-fetcher-image, build-push-frontend-image]
    if: |
      always() &&
      (needs.release-please.outputs.api_released == 'true' ||
       needs.release-please.outputs.frontend_released == 'true')
    steps:
      - name: Dispatch app-released event to bjjeire-deploy
        env:
          GH_TOKEN: ${{ secrets.CHARTS_REPO_PAT }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository_owner }}/bjjeire-deploy/dispatches \
            -f event_type=app-released \
            -f 'client_payload[api_version]=${{ needs.release-please.outputs.api_version }}' \
            -f 'client_payload[api_released]=${{ needs.release-please.outputs.api_released }}' \
            -f 'client_payload[seeder_version]=${{ needs.release-please.outputs.api_version }}' \
            -f 'client_payload[frontend_version]=${{ needs.release-please.outputs.frontend_version }}' \
            -f 'client_payload[frontend_released]=${{ needs.release-please.outputs.frontend_released }}' \
            -f 'client_payload[sha]=${{ github.sha }}'
