name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  DOTNET_CONTAINER: "mcr.microsoft.com/dotnet/sdk:10.0"
  NODE_CONTAINER: "node:24-bookworm-slim"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api_released: ${{ steps.release.outputs['src/BjjEire.Api--release_created'] }}
      api_tag: ${{ steps.release.outputs['src/BjjEire.Api--tag_name'] }}
      api_version: ${{ steps.release.outputs['src/BjjEire.Api--version'] }}
      frontend_released: ${{ steps.release.outputs['src/bjjeire-app--release_created'] }}
      frontend_tag: ${{ steps.release.outputs['src/bjjeire-app--tag_name'] }}
      frontend_version: ${{ steps.release.outputs['src/bjjeire-app--version'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api-artifacts:
    name: Publish API NuGet Artifacts
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Pack
        shell: bash
        run: >
          dotnet pack src/BjjEire.Api/BjjEire.Api.csproj
          -c Release
          -p:PackageVersion=${{ needs.release-please.outputs.api_version }}
          -o ./artifacts

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ needs.release-please.outputs.api_tag }}
          files: ./artifacts/*.nupkg

  publish-frontend-artifacts:
    name: Publish Frontend Dist Artifacts
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: release-please
    if: needs.release-please.outputs.frontend_released == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        working-directory: src/bjjeire-app
        shell: bash
        run: npm ci

      - name: Build
        working-directory: src/bjjeire-app
        env:
          VITE_APP_API_URL: /api
          VITE_APP_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_APP_MSAL_CLIENT_ID: ${{ secrets.VITE_APP_MSAL_CLIENT_ID }}
          VITE_APP_MSAL_AUTHORITY: ${{ secrets.VITE_APP_MSAL_AUTHORITY }}
          VITE_APP_MSAL_API_SCOPE: ${{ secrets.VITE_APP_MSAL_API_SCOPE }}
          VITE_APP_CONTACT_EMAIL: ${{ secrets.VITE_APP_CONTACT_EMAIL }}
          VITE_APP_SOCIAL_INSTAGRAM_URL: ${{ secrets.VITE_APP_SOCIAL_INSTAGRAM_URL }}
          VITE_APP_SOCIAL_FACEBOOK_URL: ${{ secrets.VITE_APP_SOCIAL_FACEBOOK_URL }}
          VITE_APP_GITHUB_URL: ${{ secrets.VITE_APP_GITHUB_URL }}
          VITE_APP_CF_BEACON_TOKEN: ${{ secrets.VITE_APP_CF_BEACON_TOKEN }}
        shell: bash
        run: npm run build

      - name: Archive dist
        shell: bash
        run: tar -czf frontend-dist.tar.gz -C src/bjjeire-app dist

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ needs.release-please.outputs.frontend_tag }}
          files: frontend-dist.tar.gz

  build-push-api-image:
    name: Build & Push API Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./src/BjjEire.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-api:${{ needs.release-please.outputs.api_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-api:latest
          labels: |
            org.opencontainers.image.title=bjjeire-api
            org.opencontainers.image.version=${{ needs.release-please.outputs.api_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          build-args: |
            APP_VERSION=${{ needs.release-please.outputs.api_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Attest API image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-push-seeder-image:
    name: Build & Push Seeder Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.api_released == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push seeder image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./src/BjjEire.Seeder/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-seeder:${{ needs.release-please.outputs.api_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-seeder:latest
          labels: |
            org.opencontainers.image.title=bjjeire-seeder
            org.opencontainers.image.version=${{ needs.release-please.outputs.api_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-push-frontend-image:
    name: Build & Push Frontend Image (Release)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.frontend_released == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker-container

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./src/bjjeire-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-frontend:${{ needs.release-please.outputs.frontend_version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-frontend:latest
          labels: |
            org.opencontainers.image.title=bjjeire-frontend
            org.opencontainers.image.version=${{ needs.release-please.outputs.frontend_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          build-args: |
            APP_VERSION=${{ needs.release-please.outputs.frontend_version }}
            VITE_APP_MSAL_CLIENT_ID=${{ secrets.VITE_APP_MSAL_CLIENT_ID }}
            VITE_APP_MSAL_AUTHORITY=${{ secrets.VITE_APP_MSAL_AUTHORITY }}
            VITE_APP_MSAL_API_SCOPE=${{ secrets.VITE_APP_MSAL_API_SCOPE }}
            VITE_APP_CF_BEACON_TOKEN=${{ secrets.VITE_APP_CF_BEACON_TOKEN }}
            VITE_APP_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_APP_CONTACT_EMAIL=${{ secrets.VITE_APP_CONTACT_EMAIL }}
            VITE_APP_SOCIAL_INSTAGRAM_URL=${{ secrets.VITE_APP_SOCIAL_INSTAGRAM_URL }}
            VITE_APP_SOCIAL_FACEBOOK_URL=${{ secrets.VITE_APP_SOCIAL_FACEBOOK_URL }}
            VITE_APP_GITHUB_URL=${{ secrets.VITE_APP_GITHUB_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Attest frontend image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/bjjeire-frontend
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  purge-cloudflare-cache:
    name: Purge Cloudflare CDN Cache
    runs-on: ubuntu-latest
    needs: [release-please, build-push-frontend-image]
    if: needs.release-please.outputs.frontend_released == 'true'
    timeout-minutes: 5
    steps:
      - name: Purge index.html from Cloudflare edge
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://bjjeire.com/","https://bjjeire.com/index.html","https://www.bjjeire.com/","https://www.bjjeire.com/index.html"]}' \
            | jq '.success'
