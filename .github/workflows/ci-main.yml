name: CI Main Delivery

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "24.x"
  DOTNET_CONTAINER: "mcr.microsoft.com/dotnet/sdk:10.0"
  NODE_CONTAINER: "node:24-bookworm-slim"
  PLAYWRIGHT_CONTAINER: "mcr.microsoft.com/playwright:v1.59.1-noble"
  SOLUTION_PATH: "BjjEire.sln"
  REACT_APP_PATH: "src/bjjeire-app"
  CONFIGURATION: Release

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050  # v3
        with:
          filters: |
            api:
              - 'src/BjjEire*/**'
              - 'tests/**'
              - '*.sln'
              - 'Directory.*.props'
            frontend:
              - 'src/bjjeire-app/**'

  smoke_tests:
    name: Smoke Tests (Docker Compose)
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/')
    uses: ianoflynnautomation/bjjeire-tests/.github/workflows/playwright-tests.yml@main
    with:
      environment_type: docker
      compose_files: |
          docker-compose.yml
          docker-compose.override.local.yml
          docker-compose.override.ci.yml
      compose_pre_up_script: .github/scripts/smoke-pre-up.sh
      seed_data: true
      compose_health_url: http://localhost:5003/health
      base_url: http://localhost:3000
      api_base_url: http://localhost:5003
      test_repo: ianoflynnautomation/bjjeire-tests
      test_tags: "@smoke"
      playwright_projects: '["api","ui-chromium"]'
    secrets: inherit

  build_push:
    name: Build & Push Images
    needs: [detect-changes, smoke_tests]
    if: |
      always() &&
      needs.smoke_tests.result != 'failure' &&
      needs.smoke_tests.result != 'cancelled' &&
      (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/'))
    uses: ./.github/workflows/build-push-ghcr.yml
    with:
      push_images: true
    secrets: inherit

