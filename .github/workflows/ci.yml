
name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.idea/**'
      - 'logs/'
      - '.gitattributes'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - '.idea/**'
      - 'logs/'
      - '.gitattributes'
      - '.gitignore'

env:
  DOTNET_VERSION: '9.x'
  NODE_VERSION: '23.x' 
  SOLUTION_PATH: 'BjjEire.sln'
  REACT_APP_PATH: 'src/bjjeire-app'
  ACTIONS_STEP_DEBUG: true
  CONFIGURATION: release
  AZURE_CONTAINER_REGISTRY: 'bjjeireshareddevacr.azurecr.io'
  API_IMAGE_NAME: 'bjjeire-api'
  FRONTEND_IMAGE_NAME: 'bjjeire-frontend'

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write 

jobs:
  # lint:
  #   name: Lint & Format Check
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5
  #   steps:
  #     - name: Checkout Repository
  #       uses: actions/checkout@v4

  #     - name: Lint & Format Check
  #       id: build_step
  #       uses: ./.github/actions/lint
  #       with:
  #         dotnet-version: ${{ env.DOTNET_VERSION }}
  #         node-version: ${{ env.NODE_VERSION }}
  #         working-directory: ${{ env.REACT_APP_PATH }}

  build_dotnet_solution:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    # needs: lint
    timeout-minutes: 15
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build .NET Solution
        id: build_step
        uses: ./.github/actions/dotnet-build
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          path: ${{ env.SOLUTION_PATH }}
          configuration: ${{ env.CONFIGURATION }}

  publish_dotnet_test_projects:
    name: Publish .NET Test Projects
    runs-on: ubuntu-latest
    needs: build_dotnet_solution
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-type: ApiIntegrationTests
            artifact-name: published_ApiIntegrationTests
            project-path: 'tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish .NET Test Project - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-publish
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          configuration: ${{ env.CONFIGURATION }}
          output-path: ${{ github.workspace }}/published_tests/${{ matrix.artifact-name }}
          artifact-name: ${{ matrix.artifact-name }}

  run_dotnet_tests:
    name: Run .NET Tests
    runs-on: ubuntu-latest
    needs: publish_dotnet_test_projects
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: IntegrationTests
            test-artifact-name: published_ApiIntegrationTests
            test-assembly-pattern: '*IntegrationTests.dll'
            test-filter-criteria: ""

    steps:
      - name: Checkout Repository (if needed by tests)
        uses: actions/checkout@v4

      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          test-artifact-name: ${{ matrix.test-artifact-name }}
          test-assembly-pattern: |
            ${{ matrix.test-assembly-pattern }}
          test-results-name-prefix: ${{ matrix.test-type }} 
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  publish_reports:
    name: Publish Test & Coverage Reports
    runs-on: ubuntu-latest
    needs: [run_dotnet_tests]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish Test & Coverage Reports
        uses: ./.github/actions/publish_reports

  package_and_push:
    name: Package & Push to ACR
    runs-on: ubuntu-latest
    needs: run_dotnet_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (using OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/BjjEire.Api/Dockerfile
          push: true
          tags: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}, ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/bjjeire-app/Dockerfile
          push: true
          tags: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}, ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max