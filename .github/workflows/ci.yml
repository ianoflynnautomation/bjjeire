name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "24.x"
  SOLUTION_PATH: "BjjEire.sln"
  REACT_APP_PATH: "src/bjjeire-app"
  CONFIGURATION: Release
  AZURE_CONTAINER_REGISTRY: "bjjeireshareddevacr-h7e7c2fkdwbme0gc.azurecr.io"
  AZURE_CONTAINER_REGISTRY_SHORT_NAME: "bjjeireshareddevacr"
  API_IMAGE_NAME: "bjjeire-api"
  FRONTEND_IMAGE_NAME: "bjjeire-frontend"

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'src/BjjEire*/**'
              - 'tests/**'
              - '*.sln'
              - 'Directory.*.props'
            frontend:
              - 'src/bjjeire-app/**'

  lint_api:
    name: Lint .NET
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint-dotnet
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

  lint_frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
          working-directory: ${{ env.REACT_APP_PATH }}

  build_dotnet_solution:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    needs: [detect-changes, lint_api]
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 15
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build .NET Solution
        id: build_step
        uses: ./.github/actions/dotnet-build
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          path: ${{ env.SOLUTION_PATH }}
          configuration: ${{ env.CONFIGURATION }}

  publish_dotnet_test_projects:
    name: Publish .NET Test Projects
    runs-on: ubuntu-latest
    needs: build_dotnet_solution
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-type: ApplicationUnitTests
            artifact-name: published_ApplicationUnitTests
            project-path: "tests/BjjEire.Application.UnitTests/BjjEire.Application.UnitTests.csproj"
          - test-type: InfrastructureUnitTests
            artifact-name: published_InfrastructureUnitTests
            project-path: "tests/BjjEire.Infrastructure.UnitTests/BjjEire.Infrastructure.UnitTests.csproj"
          - test-type: ApiIntegrationTests
            artifact-name: published_ApiIntegrationTests
            project-path: "tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj"
    steps:
      - uses: actions/checkout@v4
      - name: Publish .NET Test Project - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-publish
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          configuration: ${{ env.CONFIGURATION }}
          output-path: ${{ github.workspace }}/published_tests/${{ matrix.artifact-name }}
          artifact-name: ${{ matrix.artifact-name }}

  run_dotnet_tests:
    name: Run .NET Tests
    runs-on: ubuntu-latest
    needs: publish_dotnet_test_projects
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: ApplicationUnitTests
            test-artifact-name: published_ApplicationUnitTests
            test-assembly-pattern: "*Application.UnitTests.dll"
            test-filter-criteria: "Category!=Ignore"
          - test-type: InfrastructureUnitTests
            test-artifact-name: published_InfrastructureUnitTests
            test-assembly-pattern: "*Infrastructure.UnitTests.dll"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApiIntegrationTests
            test-artifact-name: published_ApiIntegrationTests
            test-assembly-pattern: "*Api.IntegrationTests.dll"
            test-filter-criteria: "Category!=Ignore"

    steps:
      - uses: actions/checkout@v4
      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          test-artifact-name: ${{ matrix.test-artifact-name }}
          test-assembly-pattern: ${{ matrix.test-assembly-pattern }}
          test-results-name-prefix: ${{ matrix.test-type }}
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  build_test_frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes, lint_frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    env:
      HUSKY: "0"
      SERVICES_API_HTTPS_0: "https://api-ci-placeholder:443"
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test React Application
        uses: ./.github/actions/react-build-test
        with:
          node-version: ${{ env.NODE_VERSION }}
          working-directory: ${{ env.REACT_APP_PATH }}
          test-command: "npm test"

  publish_reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [run_dotnet_tests]
    if: always() && needs.run_dotnet_tests.result != 'skipped'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish_reports

