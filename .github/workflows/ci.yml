
name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
    paths-ignore:
      - '**.md'
      - 'logs/'
      - '.gitattributes'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'logs/'
      - '.gitattributes'
      - '.gitignore'

env:
  DOTNET_VERSION: '9.x'
  NODE_VERSION: '23.x' 
  SOLUTION_PATH: 'BjjEire.sln'
  REACT_APP_PATH: 'src/bjjeire-app'
  ACTIONS_STEP_DEBUG: true
  CONFIGURATION: release
  AZURE_CONTAINER_REGISTRY: 'bjjeireshareddevacr-h7e7c2fkdwbme0gc.azurecr.io'
  AZURE_CONTAINER_REGISTRY_SHORT_NAME: 'bjjeireshareddevacr'
  API_IMAGE_NAME: 'bjjeire-api'
  FRONTEND_IMAGE_NAME: 'bjjeire-frontend'

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write 

jobs:
  # lint:
  #   name: Lint & Format Check
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5
  #   steps:
  #     - name: Checkout Repository
  #       uses: actions/checkout@v4

  #     - name: Lint & Format Check
  #       id: build_step
  #       uses: ./.github/actions/lint
  #       with:
  #         dotnet-version: ${{ env.DOTNET_VERSION }}
  #         node-version: ${{ env.NODE_VERSION }}
  #         working-directory: ${{ env.REACT_APP_PATH }}

  build_dotnet_solution:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    # needs: lint
    timeout-minutes: 15
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build .NET Solution
        id: build_step
        uses: ./.github/actions/dotnet-build
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          path: ${{ env.SOLUTION_PATH }}
          configuration: ${{ env.CONFIGURATION }}

  publish_dotnet_test_projects:
    name: Publish .NET Test Projects
    runs-on: ubuntu-latest
    needs: build_dotnet_solution
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-type: ApiIntegrationTests
            artifact-name: published_ApiIntegrationTests
            project-path: 'tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish .NET Test Project - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-publish
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          configuration: ${{ env.CONFIGURATION }}
          output-path: ${{ github.workspace }}/published_tests/${{ matrix.artifact-name }}
          artifact-name: ${{ matrix.artifact-name }}

  run_dotnet_tests:
    name: Run .NET Tests
    runs-on: ubuntu-latest
    needs: publish_dotnet_test_projects
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: IntegrationTests
            test-artifact-name: published_ApiIntegrationTests
            test-assembly-pattern: '*IntegrationTests.dll'
            test-filter-criteria: ""

    steps:
      - name: Checkout Repository (if needed by tests)
        uses: actions/checkout@v4

      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          test-artifact-name: ${{ matrix.test-artifact-name }}
          test-assembly-pattern: |
            ${{ matrix.test-assembly-pattern }}
          test-results-name-prefix: ${{ matrix.test-type }} 
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  publish_reports:
    name: Publish Test & Coverage Reports
    runs-on: ubuntu-latest
    needs: [run_dotnet_tests]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish Test & Coverage Reports
        uses: ./.github/actions/publish_reports

  package_and_push:
    name: Package & Push to ACR
    runs-on: ubuntu-latest
    needs: run_dotnet_tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (using OIDC)
        id: azure-login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Auth Token
        id: get_acr_token
        run: |
          echo "Attempting az acr login --name <span class="math-inline">\{\{ env\.AZURE\_CONTAINER\_REGISTRY\_SHORT\_NAME\}\}"
          TOKEN\=</span>(az acr login --name "${{ env.AZURE_CONTAINER_REGISTRY_SHORT_NAME}}" --expose-token --output tsv --query accessToken)
          echo "::add-mask::$TOKEN" # Mask the token in logs
          echo "acr_token=$TOKEN" >> $GITHUB_OUTPUT
        shell: bash

      - name: ACR Docker Login (explicitly configure Docker for push) 
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ steps.get_acr_token.outputs.acr_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata for API Image
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch # e.g., main -> 'main' tag
            type=sha,format=long # e.g., latest commit SHA
            type=ref,event=pr # For PRs, but this job is not triggered by PRs
            type=ref,event=tag # e.g., v1.0.0-beta.1 -> 'v1.0.0-beta.1' tag
            # Additional tags based on semantic versioning (if using release tags)
            type=semver,pattern={{version}} # e.g., 1.0.0-beta.1
            type=semver,pattern={{major}}.{{minor}} # e.g., 1.0 (if it's not pre-release)
            # You can also add `latest=true` for push to main branches
            # type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }} # Add 'latest' tag only for main branch pushes

      - name: Generate Docker metadata for Frontend Image
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=sha,format=long
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/BjjEire.Api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/bjjeire-app/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max