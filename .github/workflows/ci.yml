name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "logs/**"
      - ".gitattributes"
      - ".gitignore"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "24.x"
  DOTNET_CONTAINER: "mcr.microsoft.com/dotnet/sdk:10.0"
  NODE_CONTAINER: "node:24-bookworm-slim"
  PLAYWRIGHT_CONTAINER: "mcr.microsoft.com/playwright:v1.58.2-noble"
  SOLUTION_PATH: "BjjEire.sln"
  REACT_APP_PATH: "src/bjjeire-app"
  CONFIGURATION: Release
  API_IMAGE_NAME: "bjjeire-api"
  FRONTEND_IMAGE_NAME: "bjjeire-frontend"

permissions:
  contents: read
  actions: read
  checks: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050  # v3
        with:
          filters: |
            api:
              - 'src/BjjEire*/**'
              - 'tests/**'
              - '*.sln'
              - 'Directory.*.props'
            frontend:
              - 'src/bjjeire-app/**'

  lint_api:
    name: Lint .NET
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-dotnet
      - name: Check .NET code formatting
        shell: bash
        run: |
          dotnet format whitespace ${{ env.SOLUTION_PATH }} --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic
          dotnet format style ${{ env.SOLUTION_PATH }} --include ./src/ --exclude ./src/BjjEire.Aspire.AppHost/ --verify-no-changes --verbosity diagnostic

  lint_frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: TypeScript type check
        shell: bash
        run: npx tsc --noEmit
      - name: ESLint check
        shell: bash
        run: npx eslint src --max-warnings 0
      - name: Prettier format check
        shell: bash
        run: npx prettier --check src/

  build_dotnet_solution:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: [detect-changes, lint_api]
    if: needs.detect-changes.outputs.api == 'true'
    timeout-minutes: 15
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-dotnet
      - name: Restore dependencies
        shell: bash
        run: dotnet restore "${{ env.SOLUTION_PATH }}"
      - name: Build
        id: build_step
        shell: bash
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration ${{ env.CONFIGURATION }} --no-restore

  run_dotnet_tests:
    name: Run .NET Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    needs: build_dotnet_solution
    if: needs.build_dotnet_solution.outputs.build_successful == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - test-type: ApiUnitTests
            project-path: "tests/BjjEire.Api.UnitTests/BjjEire.Api.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: DomainUnitTests
            project-path: "tests/BjjEire.Domain.UnitTests/BjjEire.Domain.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApplicationUnitTests
            project-path: "tests/BjjEire.Application.UnitTests/BjjEire.Application.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: InfrastructureUnitTests
            project-path: "tests/BjjEire.Infrastructure.UnitTests/BjjEire.Infrastructure.UnitTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApplicationIntegrationTests
            project-path: "tests/BjjEire.Application.IntegrationTests/BjjEire.Application.IntegrationTests.csproj"
            test-filter-criteria: "Category!=Ignore"
          - test-type: ApiIntegrationTests
            project-path: "tests/BjjEire.Api.IntegrationTests/BjjEire.Api.IntegrationTests.csproj"
            test-filter-criteria: "Category!=Ignore"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run .NET Tests - ${{ matrix.test-type }}
        uses: ./.github/actions/dotnet-run-tests
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          project-path: ${{ matrix.project-path }}
          test-results-name-prefix: ${{ matrix.test-type }}
          test-filter-criteria: ${{ matrix.test-filter-criteria }}

  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: [detect-changes, lint_frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    env:
      HUSKY: "0"
      SERVICES_API_HTTPS_0: "https://api-ci-placeholder:443"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Build
        shell: bash
        run: npm run build

  test_frontend_unit:
    name: Test Frontend (Unit)
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: [detect-changes, lint_frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    env:
      HUSKY: "0"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Run unit tests
        shell: bash
        run: npm test

  test_frontend_integration:
    name: Test Frontend (Integration)
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm-slim
    needs: [detect-changes, lint_frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 10
    env:
      HUSKY: "0"
    defaults:
      run:
        working-directory: ${{ env.REACT_APP_PATH }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-node
        with:
          working-directory: ${{ env.REACT_APP_PATH }}
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Run integration tests
        shell: bash
        run: npm run test:integration

  test_frontend_browser:
    name: Test Frontend (Browser)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    needs: [detect-changes, lint_frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    timeout-minutes: 15
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/react-test-browser
        with:
          working-directory: ${{ env.REACT_APP_PATH }}

  smoke_tests:
    name: Smoke Tests (Docker Compose)
    needs:
      - detect-changes
      - run_dotnet_tests
      - build_frontend
      - test_frontend_unit
      - test_frontend_integration
      - test_frontend_browser
    if: |
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.frontend == 'true'
    uses: ianoflynnautomation/bjjeire-tests/.github/workflows/playwright-tests.yml@main
    with:
      environment_type: docker
      compose_files: |
          docker-compose.yml
          docker-compose.override.local.yml
          docker-compose.override.ci.yml
      compose_pre_up_script: .github/scripts/smoke-pre-up.sh
      seed_data: true
      compose_health_url: http://localhost:5003/health
      base_url: http://localhost:3000
      api_base_url: http://localhost:5003
      test_repo: ianoflynnautomation/bjjeire-tests
      test_tags: "@smoke"
      playwright_projects: '["api","ui-chromium"]'
    secrets: inherit

  publish_reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [run_dotnet_tests]
    if: always() && needs.run_dotnet_tests.result != 'skipped'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/publish_reports

  build_push:
    name: Build & Push Images
    needs:
      - run_dotnet_tests
      - build_frontend
      - test_frontend_unit
      - test_frontend_integration
      - test_frontend_browser
      - smoke_tests
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) &&
      needs.run_dotnet_tests.result != 'failure' &&
      needs.build_frontend.result != 'failure' &&
      needs.test_frontend_unit.result != 'failure' &&
      needs.test_frontend_integration.result != 'failure' &&
      needs.test_frontend_browser.result != 'failure' &&
      needs.smoke_tests.result != 'failure'
    uses: ./.github/workflows/build-push-ghcr.yml
    with:
      push_images: true
    secrets: inherit

