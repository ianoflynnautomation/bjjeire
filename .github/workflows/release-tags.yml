name: Release Tag Pipeline

on:
  push:
    tags:
      - "api-v*"
      - "frontend-v*"

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  APP_BASE_URL: https://bjjeire.com
  API_HEALTH_URL: https://bjjeire.com/health

jobs:
  release-tag-context:
    name: Resolve Release Tag Context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      component: ${{ steps.context.outputs.component }}
      version: ${{ steps.context.outputs.version }}
    steps:
      - name: Describe release tag
        id: context
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          case "$TAG" in
            api-v*)
              COMPONENT="api"
              VERSION="${TAG#api-v}"
              ;;
            frontend-v*)
              COMPONENT="frontend"
              VERSION="${TAG#frontend-v}"
              ;;
            *)
              echo "Unsupported release tag: $TAG"
              exit 1
              ;;
          esac

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag detected"
          echo "component=$COMPONENT"
          echo "version=$VERSION"

  verify-production-release:
    name: Verify Production Release
    runs-on: ubuntu-latest
    needs: release-tag-context
    timeout-minutes: 20
    environment:
      name: production
      url: https://bjjeire.com
    steps:
      - name: Wait for production to serve healthy responses
        shell: bash
        env:
          COMPONENT: ${{ needs.release-tag-context.outputs.component }}
          VERSION: ${{ needs.release-tag-context.outputs.version }}
        run: |
          set -euo pipefail

          APP_URL="${APP_BASE_URL}"
          HEALTH_URL="${API_HEALTH_URL}"
          ATTEMPTS=20
          SLEEP_SECONDS=30

          echo "Verifying production release for component=${COMPONENT} version=${VERSION}"
          echo "App URL: ${APP_URL}"
          echo "Health URL: ${HEALTH_URL}"

          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Attempt ${attempt}/${ATTEMPTS}"

            APP_STATUS="$(curl -L -s -o /tmp/app-response.html -w '%{http_code}' "${APP_URL}")"
            HEALTH_STATUS="$(curl -L -s -o /tmp/health-response.txt -w '%{http_code}' "${HEALTH_URL}")"

            if [ "${APP_STATUS}" = "200" ] && [ "${HEALTH_STATUS}" = "200" ]; then
              echo "Production checks passed."
              exit 0
            fi

            echo "App status: ${APP_STATUS}"
            echo "Health status: ${HEALTH_STATUS}"

            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "Production verification failed after ${ATTEMPTS} attempts."
          exit 1
