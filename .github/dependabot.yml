version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 10
    reviewers:
      - "ianoflynnautomation"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "Microsoft.*"
        versions: ["10.x"] # Be careful with wildcards in versions here, usually specific versions or ranges
      - dependency-name: "Aspire.*"
        versions: ["10.x"] # Same as above