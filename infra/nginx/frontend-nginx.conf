# frontend-nginx.conf (This will be placed in a ConfigMap in Kubernetes)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log combined;
    server_tokens off; # Hide NGINX version for security

    server {
        listen 80; # Listen on HTTP only, Ingress will handle HTTPS externally
        server_name _; # Catch-all server name for internal K8s service

        # Performance: Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6; # Balance between compression and CPU usage
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_min_length 256;
        gzip_types
            application/atom+xml
            application/geo+json
            application/javascript
            application/x-javascript
            application/json
            application/ld+json
            application/manifest+json
            application/rdf+xml
            application/rss+xml
            application/vnd.ms-fontobject
            application/wasm
            application/x-web-app-manifest+json
            application/xhtml+xml
            application/xml
            font/eot
            font/otf
            font/ttf
            image/svg+xml
            image/x-icon
            text/cache-manifest
            text/css
            text/javascript
            text/plain
            text/vcard
            text/vnd.rim.location.xloc
            text/vtt
            text/x-component
            text/x-cross-domain-policy;

        # Serve static files for the UI
        root /usr/share/nginx/html;

        # Cache static assets
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y; # Cache these assets for a long time
            add_header Cache-Control "public";
            access_log off; # Don't log access to static assets if not needed
        }

        # Catch-all for React/Vite routing (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend API service in Kubernetes
        location /api/ {
            # Use the internal Kubernetes Service DNS for your API
            # Replace 'api.bjj-app.svc.cluster.local:8080' with the actual internal service endpoint.
            # Assuming your API service listens on HTTP 8080 internally after TLS is terminated at Ingress
            proxy_pass http://api.bjj-app.svc.cluster.local:8080/;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # Will be 'http' internally, but reflects external protocol from Ingress

            # For WebSocket support (if your API uses it)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # Security Headers (often handled by Ingress or global policies, but can be here too)
            proxy_pass_header Content-Security-Policy;
            proxy_pass_header Permissions-Policy;
        }

        # Health check endpoint for Kubernetes probes
        location /health {
            access_log off; # Don't log health checks
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}