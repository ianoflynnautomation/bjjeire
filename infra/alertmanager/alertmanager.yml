global:
  # Default receiver if no specific route matches
  # resolve_timeout: 5m # How long to wait for an alert to resolve before declaring it resolved

  # --- IMPORTANT: Replace with your actual Slack API URL ---
  # slack_api_url: '${SLACK_WEBHOOK_URL}' # Use environment variable for secrets

route:
  # Default receiver for all alerts if no child routes match
  receiver: 'email-notifications'
  # How long to wait to buffer alerts of the same group before sending initial notification
  group_wait: 30s
  # How long to wait before sending notification about new alerts that match existing group
  group_interval: 5m
  # How long to wait before repeating notification for firing alerts
  repeat_interval: 1h

  # Example routes based on severity (optional)
