
global:
  scrape_interval: 10s
  # external_labels:
  # monitor: 'bjjworld-monitor'

rule_files:
  - /etc/prometheus/rules/*.rules.yml 

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093 

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bjjworld.api'
    static_configs:
      - targets: ['api:80']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    scheme: http

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'node-exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongo-exporter:9216']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
  
  - job_name: 'patroni'
    metrics_path: /metrics
    scheme: http 
    basic_auth:
      username: postgres
      password: postgres
    static_configs:
      - targets:
          -  postgres-1:8008
          -  postgres-2:8008
