groups:
- name: infrastructure_alerts
  rules:

  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Instance {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

  - alert: HostHighCpuLoad
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
    for: 5m 
    labels:
      severity: warning
    annotations:
      summary: "Host high CPU load on {{ $labels.instance }}"
      description: "CPU load is {{ $value | printf \"%.2f\" }}% on {{ $labels.instance }}."

  - alert: HostHighMemoryUsage
    expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
    for: 5m 
    labels:
      severity: warning
    annotations:
      summary: "Host high memory usage on {{ $labels.instance }}"
      description: "Memory usage is {{ $value | printf \"%.2f\" }}% on {{ $labels.instance }}."

  - alert: HostLowDiskSpace
    expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 10
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Host low disk space on {{ $labels.instance }} mount {{ $labels.mountpoint }}"
      description: "Disk space is {{ $value | printf \"%.2f\" }}% free on {{ $labels.instance }} mount {{ $labels.mountpoint }}."

- name: application_api_alerts
  rules:
  - alert: ApiHighErrorRate
    expr: >
      sum(rate(http_server_requests_seconds_count{job="bjjworld.api", code=~"5.."}[5m]))
      /
      sum(rate(http_server_requests_seconds_count{job="bjjworld.api"}[5m]))
      * 100 > 5
    for: 2m 
    labels:
      severity: critical
    annotations:
      summary: "API high error rate (job: {{ $labels.job }})"
      description: "More than 5% of requests to {{ $labels.job }} are failing (5xx errors). Current rate: {{ $value | printf \"%.2f\" }}%."

  - alert: ApiHighRequestLatency
    expr: >
      histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="bjjworld.api"}[5m])) by (le, job))
      > 1.5 # P95 latency greater than 1.5 seconds
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "API high request latency (job: {{ $labels.job }})"
      description: "The 95th percentile latency for {{ $labels.job }} is {{ $value | printf \"%.2f\" }}s (threshold > 1.5s)."

- name: database_mongodb_alerts
  rules:

  - alert: MongoDbHighConnections
    expr: mongodb_connections{job="mongodb", state="current"} > 500 
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "MongoDB high connection count on {{ $labels.instance }}"
      description: "MongoDB instance {{ $labels.instance }} has {{ $value }} active connections (threshold > 500)."

  # Add alerts for slow queries, replication lag, etc., if your exporter provides those metrics.

