apiVersion: 1

providers:
  - name: 'default-dashboards' 
    orgId: 1 
    folder: 'Provisioned Dashboards'
    type: file
    disableDeletion: false # Set to true in production to prevent UI deletion
    updateIntervalSeconds: 60
    editable: false # Set to true for development/testing, false for production read-only dashboards
    options:
      path: /var/lib/grafana/dashboards
      # Optional: Set to true to automatically update dashboards if the source file changes.Requires Grafana Enterprise.
      # developers_mode: true

