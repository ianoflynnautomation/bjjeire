global
 log /dev/log local0
 maxconn 4096
 # Enable better logging for debugging
#  log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"

defaults
 log global
 mode tcp
 retries 3
 timeout connect 5000
 timeout client 50000
 timeout server 50000
 option tcpka

frontend write_frontend
 bind *:5432
 mode tcp
 option tcplog
 default_backend postgresql_write_backend

backend postgresql_write_backend
 mode tcp
 option httpchk GET /healthz/leader HTTP/1.1
 http-check expect status 200
 server postgres-1 postgres-1:5432 check port 8008
 # server postgres-2 postgres-2:5432 check port 8008

frontend read_frontend
 bind *:5433
 mode tcp
 option tcplog
 default_backend postgresql_read_backend

backend postgresql_read_backend
 mode tcp
 option httpchk GET /healthz/replica HTTP/1.1
 http-check expect status 200
 server postgres-1 postgres-1:5432 check port 8008
 # server postgres-2 postgres-2:5432 check port 8008

listen stats
 bind *:7000
 mode http
 stats enable
 stats uri /
 stats refresh 10s
 stats auth admin:admin



